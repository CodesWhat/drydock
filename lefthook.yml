---
# Lefthook configuration — mirrors CI pipeline for local/CI parity.
#
# Pre-push pipeline (piped = sequential, fail-fast):
#   0. Clean tree gate — rejects untracked/uncommitted/stashed files
#   1. Lint gate (~20s) — catches formatting/lint before burning CPU
#   2. Build + test (~26s parallel) — independent workspaces run concurrently
#   3. E2E + advisory scans (zizmor)
#
# Snyk scans are CI-only (release workflow) to preserve the 200/month quota.
#
# Biome runs directly (not via qlty) because qlty's biome integration
# does not reliably apply fixes. Qlty handles all other linters.

pre-commit:
  piped: true
  commands:
    biome-fix:
      glob: '*.{ts,js,json,vue,css}'
      run: npx biome check --fix --no-errors-on-unmatched {staged_files} && git add {staged_files}
      priority: 1
    biome-format:
      glob: '*.{ts,js,json,vue,css}'
      run: npx biome format --write --no-errors-on-unmatched {staged_files} && git add {staged_files}
      priority: 2

pre-push:
  piped: true
  commands:
    # ── Clean tree gate: fail if working tree is dirty ─────────────────
    # Catches untracked files (which hang qlty on interactive prompts),
    # uncommitted changes (which pass locally but fail CI), and stashed
    # changes (which hide work that should be committed or discarded).
    clean-tree:
      run: |
        dirty=$(git status --porcelain 2>/dev/null)
        stash=$(git stash list 2>/dev/null)
        fail=0
        if [ -n "$dirty" ]; then
          echo "❌ Working tree is not clean:"
          echo "$dirty"
          echo ""
          echo "Commit, stash, or remove these files before pushing."
          fail=1
        fi
        if [ -n "$stash" ]; then
          echo "⚠️  Stash is not empty:"
          echo "$stash"
          echo ""
          echo "Apply or drop stashed changes — they won't be in CI."
          fail=1
        fi
        exit $fail
      priority: 0

    # ── Lint gate: fast checks that catch formatting/lint issues ──────
    ts-nocheck:
      run: node scripts/check-ts-nocheck-allowlist.mjs
      priority: 1
    biome:
      run: npx biome check .
      priority: 2
    qlty:
      run: CI=1 qlty check --all --no-progress
      priority: 3

    # ── Build + test: parallel across independent workspaces ─────────
    build-and-test:
      run: ./scripts/pre-push-build-test.sh
      priority: 4

    # ── E2E: mirrors CI "E2E Tests" job ──────────────────────────────
    e2e:
      run: ./scripts/run-e2e-tests.sh
      priority: 5

    # ── Advisory: mirrors CI advisory jobs (non-blocking) ────────────
    zizmor:
      glob: '.github/workflows/*.yml'
      run: zizmor .github/workflows/ || true
      skip:
        - run: '! command -v zizmor >/dev/null 2>&1'
      priority: 6
