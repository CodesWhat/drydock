---
# Lefthook configuration — mirrors CI pipeline for local/CI parity.
# pre-push is piped (sequential, fail-fast) so failures surface clearly.
# Each step matches a CI job exactly — if lefthook passes, CI passes.

pre-commit:
  piped: true
  commands:
    biome-fix:
      glob: '*.{ts,js,json,vue,css}'
      run: npx biome check --fix {staged_files} && git add {staged_files}
      priority: 1
    biome-format:
      glob: '*.{ts,js,json,vue,css}'
      run: npx biome format --write {staged_files} && git add {staged_files}
      priority: 2

pre-push:
  piped: true
  commands:
    # ── Type safety debt guard: block new @ts-nocheck ─────────────
    ts-nocheck-allowlist:
      run: node scripts/check-ts-nocheck-allowlist.mjs
      priority: 1

    # ── Biome: lint + format check ─────────────────────────────
    biome:
      run: npx biome check .
      priority: 2

    # ── Qlty: all other linters (actionlint, hadolint, etc.) ──
    qlty:
      run: CI=1 qlty check --all --no-progress
      priority: 3

    # ── Build: mirrors CI "Build" job ─────────────────────────────
    build-app:
      root: app/
      run: npm run build
      priority: 4
    build-ui:
      root: ui/
      run: npm run build
      priority: 5

    # ── Test: mirrors CI "Test & Coverage" job ────────────────────
    test-app:
      root: app/
      run: npm test
      priority: 6
    test-ui:
      root: ui/
      run: npm run test:unit
      priority: 7

    # ── E2E: mirrors CI "E2E Tests" job ───────────────────────────
    e2e:
      run: ./scripts/run-e2e-tests.sh
      priority: 8

    # ── Advisory: mirrors CI advisory jobs (non-blocking) ─────────
    zizmor:
      glob: '.github/workflows/*.yml'
      run: zizmor .github/workflows/ || true
      skip:
        - run: '! command -v zizmor >/dev/null 2>&1'
      priority: 9

    # ── Local security gates (not in CI, skip if tool missing) ────
    snyk-deps:
      root: app/
      run: ../scripts/snyk-deps-gate.sh --org=codeswhat
      skip:
        - run: '! command -v snyk >/dev/null 2>&1'
      priority: 10
    snyk-code:
      run: scripts/snyk-code-gate.sh --org=codeswhat
      skip:
        - run: '! command -v snyk >/dev/null 2>&1'
      priority: 11
