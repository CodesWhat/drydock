config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/*.d.ts",
  "**/.yarn/**",
  "**/bower_components/**",
  "**/build/**",
  "**/cache/**",
  "**/config/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/extern/**",
  "**/external/**",
  "**/generated/**",
  "**/Godeps/**",
  "**/gradlew/**",
  "**/mvnw/**",
  "**/node_modules/**",
  "**/protos/**",
  "**/seed/**",
  "**/target/**",
  "**/testdata/**",
  "**/vendor/**",
  "**/assets/**",
  ".qlty/out/**",
  ".qlty/logs/**",
  ".qlty/results/**",
  ".qlty/plugin_cachedir/**",
  "prototypes/**/style.css",
  ".playwright-cli/**",
  "output/**",
  "app/coverage/**",
  "ui/coverage/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

# Disabled: guard clauses, switch dispatches, and icon/color maps produce many returns by design
[smells.return_statements]
enabled = false

# Disabled: core domain files (watchers, triggers, API routes) are inherently complex;
# splitting them would hurt cohesion without improving readability
[smells.file_complexity]
enabled = false

[[source]]
name = "default"
default = true

[[plugin]]
name = "actionlint"

[[plugin]]
name = "checkov"

[[plugin]]
name = "dockerfmt"

[[plugin]]
name = "hadolint"

[[plugin]]
name = "markdownlint"
mode = "comment"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "radarlint-iac"
mode = "monitor"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "shellcheck"

[[plugin]]
name = "shfmt"

[[plugin]]
name = "trivy"
drivers = [
  "config",
]
version = "0.69.3"

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "yamllint"

[[plugin]]
name = "zizmor"

# Entrypoint uses su-exec for runtime privilege drop; no static USER needed
[[triage]]
match.rules = ["trivy:DS002", "trivy:DS-0002"]
set.ignored = true

# ── osv-scanner: non-shipping advisory triage (maintenance/1.4.x) ─────────────
# These advisories are reported against dependency versions that are NOT present
# in the shipped drydock 1.4.x artifact. The backend image runs `npm prune
# --omit=dev` (Dockerfile) and the dashboard ships as static build output, so
# dev/build/test dependencies never reach the deployed container. Verified via
# `npm ls --omit=dev` that every runtime dependency is on a patched version
# (protobufjs 7.6.4, @grpc/grpc-js 1.14.4, ws 8.21.0, yaml 2.9.0,
# fast-xml-parser 5.8.0, uuid 13.0.2, path-to-regexp 8.4.2, fast-xml-builder
# 1.2.0). The flagged-vulnerable versions live only in apps/web (Next.js site,
# deployed from main), the e2e harness, and build tooling — surfaces maintained
# on main and tracked separately. Pinned by CVE id, so a NEW advisory against a
# shipped version still fails the gate.
[[triage]]
match.rules = [
  "osv-scanner:CVE-2026-2950",
  "osv-scanner:CVE-2026-33349",
