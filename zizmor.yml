# zizmor configuration
# https://docs.zizmor.sh/configuration/
#
# The impostor-commit audit for codeql.yml is ignored because the
# GitHub API compare endpoint returns 403 for github/codeql-action,
# causing a fatal "no audit was performed" error. This is a first-party
# GitHub action pinned by SHA — impostor-commit risk is negligible.
rules:
  impostor-commit:
    ignore:
      - codeql.yml
