"preserve_hierarchy": true

"pull_request_title": "i18n: sync translations from Crowdin"
"pull_request_labels":
  - "translations"
  - "crowdin"

"files":
  - "source": "/ui/src/locales/en/**/*.json"
    "translation": "/ui/src/locales/%two_letters_code%/**/%original_file_name%"
    "languages_mapping":
      "two_letters_code":
        "zh-CN": "zh-CN"
        "zh-TW": "zh-TW"
        "pt-BR": "pt-BR"
        "pt-PT": "pt-PT"
