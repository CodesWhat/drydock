# Credentials are supplied by the Crowdin GitHub Action via repo secrets
# (CROWDIN_PROJECT_ID, CROWDIN_PERSONAL_TOKEN), not committed here.
preserve_hierarchy: true

commit_message: "i18n: sync %language% translations from Crowdin"
append_commit_message: false
pull_request_title: "i18n: sync translations from Crowdin"
pull_request_labels:
  - translations
  - crowdin

files:
  - source: /ui/src/locales/en/**/*.json
    translation: /ui/src/locales/%locale%/**/%original_file_name%
    update_option: update_as_unapproved
