name: "🎭 E2E: Playwright"
run-name: >-
  ${{
    github.event_name == 'pull_request' && format('🎭 E2E: Playwright — PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title) ||
    github.event_name == 'push' && format('🎭 E2E: Playwright — {0}', github.event.head_commit.message) ||
    github.event_name == 'merge_group' && format('🎭 E2E: Playwright — Merge Queue: {0}', github.ref_name) ||
    format('🎭 E2E: Playwright — {0}', github.ref_name)
  }}

# Playwright lives in its own workflow so a single failing UI assertion
# does not flip the github-actions Check Suite on ci-verify.yml to
# "failure". A failing suite caused OpenSSF Scorecard's CI-Tests check
# to mark the merged PR as untested (see alert #43 dismissal context),
# even though every other job in ci-verify was green. Each workflow
# file gets its own Check Suite per commit, so isolating Playwright
# keeps ci-verify's suite reliably green for Scorecard while the
# Playwright job remains a required status check via branch ruleset.

on:
  push:
    # Only `main` — release/** branches reach main via a PR (covered by
    # `pull_request` below). Triggering on `push: release/**` produced a
    # duplicate run that the concurrency group cancelled, and the cancelled
    # run blocked the PR's required-status rollup on every release cut.
    branches:
      - main
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

concurrency:
  group: e2e-playwright-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

env:
  # Keep host-side npm installs from trying to download Chromium before the
  # Playwright test step runs inside the official browser image.
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

jobs:
  changes:
    name: "🔎 Changes: Path Filter"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      runtime: ${{ steps.filter.outputs.runtime }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          base: ${{ github.event_name == 'push' && github.event.before || '' }}
          # Shared with ci-verify.yml so Cucumber and Playwright short-circuit
          # symmetrically on pure docs/changelog edits.
          filters: .github/filters/runtime.yml

  playwright:
    name: "🎭 E2E: Playwright"
    if: needs.changes.outputs.runtime == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35  # UI build + Docker build + QA stack startup + Playwright pull + UI flow tests
    needs: [changes]
    permissions:
      contents: read
    env:
      # Pinned to match @playwright/test in e2e/package.json. Ships with
      # the matching chromium build pre-installed at /ms-playwright, which
      # eliminates the cdn.playwright.dev runtime dependency that used to
      # cause cold-cache install failures whenever the GitHub Actions
      # runner image rotated and dropped its pre-baked browser.
      # Pinned by digest as well as tag so a mutated/republished :v1.60.0-noble
      # tag cannot silently change the image we pull and run.
      PLAYWRIGHT_IMAGE: mcr.microsoft.com/playwright:v1.60.0-noble@sha256:9bd26ad900bb5e0f4dee75839e957a89ae89c2b7ab1e76050e559790e946b948

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Verify Playwright image matches package
        shell: bash
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./e2e/package.json').devDependencies['@playwright/test']")"
          if [[ ! "$PLAYWRIGHT_IMAGE" =~ :v([0-9]+\.[0-9]+\.[0-9]+)-noble(@sha256:[0-9a-f]{64})?$ ]]; then
            echo "::error title=Invalid Playwright image tag::Expected $PLAYWRIGHT_IMAGE to use :v<major>.<minor>.<patch>-noble optionally pinned with @sha256:<digest>."
            exit 1
          fi

          image_version="${BASH_REMATCH[1]}"
          if [[ "$package_version" != "$image_version" ]]; then
            echo "::error title=Playwright version mismatch::PLAYWRIGHT_IMAGE uses $image_version, but e2e/package.json pins @playwright/test to $package_version."
            exit 1
          fi

      - name: Install ui dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: cd ui && npm ci

      - name: Build ui
        run: npm run build
        working-directory: ui

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      # Shares the `drydock` GHA cache scope with ci-verify's build job,
      # so the second workflow to run hits a warm cache.
      - name: Docker build (QA image)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: drydock:dev
          build-args: DD_VERSION=ci
          # load: true uses the docker exporter, which can't accept the OCI
          # manifest list produced by provenance attestations. Real
          # attestations live on release-cut.yml's push step.
          provenance: false
          cache-from: type=gha,scope=drydock
          cache-to: type=gha,mode=max,scope=drydock,ignore-error=true

      - name: Pull Playwright container
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: docker pull "$PLAYWRIGHT_IMAGE"

      - name: Start QA stack
        run: docker compose -p drydock-playwright -f test/qa-compose.yml up -d

      - name: Wait for QA health
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            if curl -sf http://localhost:3333/health >/dev/null 2>&1; then
              echo "Drydock QA is healthy"
              exit 0
            fi
            sleep 2
          done

          echo "Drydock QA failed to become healthy after 120 seconds."
          docker compose -p drydock-playwright -f test/qa-compose.yml ps
          exit 1

      # Run npm ci + playwright test inside the official Playwright
      # container so the chromium build is sourced from the image
      # (pre-installed at /ms-playwright, version-matched to
      # @playwright/test) instead of cdn.playwright.dev at runtime.
      # PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 keeps the transitive
      # @playwright/browser-chromium postinstall from racing the same
      # download. --network host lets Playwright reach the QA stack on
      # localhost:3333. --ipc=host avoids Chrome /dev/shm OOMs, while
      # --init avoids PID 1 signal/zombie-process edge cases.
      - name: Run Playwright tests
        run: |
          docker run --rm \
            --init \
            --network host \
            --ipc=host \
            --user 1001:1001 \
            -e CI=true \
            -e PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 \
            -e HOME=/tmp \
            -v "${{ github.workspace }}:/work" \
            -w /work/e2e \
            "$PLAYWRIGHT_IMAGE" \
            sh -c "npm ci --no-audit --no-fund && npm run test:playwright"

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-html-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/playwright-report
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/test-results
          if-no-files-found: warn
          retention-days: 14

      - name: Show QA logs on failure
        if: failure()
        run: docker compose -p drydock-playwright -f test/qa-compose.yml logs --no-color

      - name: Stop QA stack
        if: always()
        run: docker compose -p drydock-playwright -f test/qa-compose.yml down -v --remove-orphans
