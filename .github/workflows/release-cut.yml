name: "🏷️ Release: Cut"
run-name: "🏷️ Release: Cut — manual by ${{ github.actor }}"

# Recoverable release pipeline. Build output is first published under
# run-scoped staging tags, signed, attested, and attached to a draft release.
# User-facing image tags, the git tag, and the GitHub release are finalized in
# that order by idempotent steps. A retry can safely finish a partial cut.
# GA releases never rebuild: they promote an exact seven-day-old RC digest and
# tag the exact RC source commit.
#
# BEFORE DISPATCHING (local pre-cut step — cannot run in CI):
#   npm run release:precheck <tag>     # e.g. npm run release:precheck v1.6.0
# Surfaces open Discussions still owed a "shipped in <version>" reply, read from
# .planning/roadmap/current-tracker.md (gitignored — invisible to this runner,
# which is why it is a local gate, not a job here). Exits non-zero on a GA tag
# with pending replies; --force to bypass. Post the replies + tick the boxes,
# then dispatch this workflow.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to cut, e.g. v1.5.0-rc.17 or v1.5.0. Tag base must match package.json version and the tag must not already exist."
        required: true
        type: string
      candidate_tag:
        description: "GA only: exact prerelease tag to promote, e.g. v1.6.0-rc.3. Must be at least seven full days old."
        required: false
        type: string
      candidate_digest:
        description: "GA only: exact sha256 digest published by candidate_tag in GHCR, Docker Hub, and Quay."
        required: false
        type: string

permissions: {}

concurrency:
  group: release-cut
  cancel-in-progress: false

env:
  DOCKER_PLATFORMS: linux/amd64,linux/arm64
  CI_VERIFY_WORKFLOW_FILE: ci-verify.yml
  E2E_PLAYWRIGHT_WORKFLOW_FILE: e2e-playwright.yml

jobs:
  release:
    name: "🚀 Release: Build, Publish, Tag"
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Multi-arch build, signing, attestations, release upload, and CI-success polling budget
    environment: release-publish
    env:
      DOCKERHUB_REPO: docker.io/codeswhat/drydock
      QUAY_REPO: quay.io/codeswhat/drydock
    permissions:
      contents: write      # git push tag, gh release create
      packages: write      # ghcr push
      id-token: write      # cosign keyless signing
      attestations: write  # attest-build-provenance + OCI attestation storage
      actions: read        # wait-for-successful-branch-ci queries workflow runs

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Assert dispatched from main
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [ "${GIT_REF}" != "refs/heads/main" ]; then
            echo "::error::release-cut must be dispatched from refs/heads/main, got ${GIT_REF}. The cosign OIDC identity is pinned to main."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Assert main is in sync with the active dev branch
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          # main is never an independent commit target: it only advances by merging from
          # dev/vX.Y before a cut. If a fix landed straight on main, main holds work the
          # integration branch never got and the next dev merge silently reverts it. That
          # is exactly how v1.6 drifted (rc.3-rc.5 fixes on main, dev 112 files behind).
          #
          # Compare TREES, not commit ancestry: this repo allows squash merges only, so
          # every dev -> main sync mints a commit dev lacks and an ancestry check would
          # always fail. Identical trees is the real invariant.
          minor="$(printf '%s' "${RELEASE_TAG}" | sed -E 's/^v?([0-9]+)\.([0-9]+)\..*/\1.\2/')"
          dev_branch="dev/v${minor}"
          # Separate "branch is absent" from "we could not ask". --exit-code collapses
          # both into a non-zero status, so a network blip or auth failure would take the
          # skip path and let a drifted main be tagged. Empty output on a successful query
          # is the only thing that means the branch is genuinely gone.
          if ! refs="$(git ls-remote --heads origin "refs/heads/${dev_branch}")"; then
            echo "::error::Could not query origin for ${dev_branch}. Refusing to skip the drift check on an unanswered question."
            exit 1
          fi
          if [ -z "${refs}" ]; then
            echo "No ${dev_branch} on origin (retired after GA, or not yet created) — nothing to compare."
            exit 0
          fi
          git fetch --quiet origin "${dev_branch}"
          if ! git diff --quiet HEAD "origin/${dev_branch}"; then
            echo "::error::main has drifted from ${dev_branch}. Cutting now would ship content ${dev_branch} never received, or miss content it has. Forward-port first, then re-dispatch."
            git diff --stat HEAD "origin/${dev_branch}" | tail -25
            exit 1
          fi
          echo "main is in sync with ${dev_branch} (identical trees)."

      - name: Resolve target SHA and lowercase repository
        id: target
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          # Docker registries reject uppercase repository names. ${GITHUB_REPOSITORY}
          # preserves the org casing (e.g. "CodesWhat/drydock") so we expose a
          # pre-lowered value for every step that builds an image reference.
          repo_lower="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          {
            echo "sha=${sha}"
            echo "repo_lower=${repo_lower}"
          } >> "$GITHUB_OUTPUT"
          echo "Target SHA: ${sha}"
          echo "Repository (lowercase): ${repo_lower}"

      - name: Resolve release tag from input
        id: next
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          if ! [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release_tag '${RELEASE_TAG}'. Expected vX.Y.Z or vX.Y.Z-prerelease (e.g. v1.5.0 or v1.5.0-rc.17)."
            exit 1
          fi

          next_version="${RELEASE_TAG#v}"
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            release_level="prerelease"
          else
            release_level="release"
          fi

          {
            echo "release_level=${release_level}"
            echo "next_version=${next_version}"
            echo "release_tag=${RELEASE_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Parse release tag
        id: tag
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
        run: |
          set -euo pipefail

          output="$(node scripts/release-tag.mjs --tag "${RELEASE_TAG}")"
          while IFS= read -r kv; do
            key="${kv%%=*}"
            value="${kv#*=}"
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done <<< "${output}"

      - name: Resolve release source and validate GA candidate
        id: source
        env:
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
          CANDIDATE_TAG: ${{ inputs.candidate_tag }}
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ steps.tag.outputs.is_prerelease }}
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail

          source_sha="${TARGET_SHA}"
          image_digest=""

          if [ "${IS_PRERELEASE}" = "true" ]; then
            if [ -n "${CANDIDATE_TAG}" ] || [ -n "${CANDIDATE_DIGEST}" ]; then
              echo "::error::candidate_tag and candidate_digest are GA-only inputs. Leave both empty for ${RELEASE_TAG}."
              exit 1
            fi
          else
            if ! [[ "${CANDIDATE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
              echo "::error::GA releases require candidate_tag in exact vX.Y.Z-rc.N form."
              exit 1
            fi
            if ! [[ "${CANDIDATE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "::error::GA releases require candidate_digest in exact sha256:<64 lowercase hex> form."
              exit 1
            fi
            if [ "${CANDIDATE_TAG%-rc.*}" != "${RELEASE_TAG}" ]; then
              echo "::error::Candidate ${CANDIDATE_TAG} does not belong to GA release ${RELEASE_TAG}."
              exit 1
            fi
            if ! git rev-parse -q --verify "refs/tags/${CANDIDATE_TAG}^{commit}" >/dev/null; then
              echo "::error::Candidate tag ${CANDIDATE_TAG} does not exist in the fetched repository."
              exit 1
            fi

            release_json="$(gh release view "${CANDIDATE_TAG}" --repo "${GITHUB_REPOSITORY}" --json isPrerelease,publishedAt,tagName)"
            if [ "$(jq -r '.isPrerelease' <<< "${release_json}")" != "true" ]; then
              echo "::error::Candidate ${CANDIDATE_TAG} is not a published prerelease."
              exit 1
            fi
            published_at="$(jq -er '.publishedAt' <<< "${release_json}")"
            published_epoch="$(date -u -d "${published_at}" +%s)"
            age_seconds="$(( $(date -u +%s) - published_epoch ))"
            if [ "${age_seconds}" -lt 604800 ]; then
              echo "::error::Candidate ${CANDIDATE_TAG} is only ${age_seconds}s old; GA promotion requires seven full days (604800s)."
              exit 1
            fi

            source_sha="$(git rev-parse "${CANDIDATE_TAG}^{commit}")"
            image_digest="${CANDIDATE_DIGEST}"
          fi

          if existing_sha="$(git rev-parse -q --verify "refs/tags/${RELEASE_TAG}^{commit}" 2>/dev/null)"; then
            if [ "${existing_sha}" != "${source_sha}" ]; then
              echo "::error::Existing ${RELEASE_TAG} tag points to ${existing_sha}, expected ${source_sha}."
              exit 1
            fi
            echo "Existing release tag matches the requested source; continuing recoverable finalization."
          fi

          {
            echo "source_sha=${source_sha}"
            echo "image_digest=${image_digest}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout exact release source
        env:
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          set -euo pipefail
          git checkout --detach "${SOURCE_SHA}"
          test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"

      - name: Wait for successful branch CI on release source SHA
        uses: ./.github/actions/wait-for-successful-branch-ci
        with:
          github-token: ${{ github.token }}
          workflow-file: ${{ env.CI_VERIFY_WORKFLOW_FILE }}
          target-sha: ${{ steps.source.outputs.source_sha }}
          max-attempts: '18'
          sleep-seconds: '300'

      - name: Wait for successful E2E Playwright on release source SHA
        uses: ./.github/actions/wait-for-successful-branch-ci
        with:
          github-token: ${{ github.token }}
          workflow-file: ${{ env.E2E_PLAYWRIGHT_WORKFLOW_FILE }}
          target-sha: ${{ steps.source.outputs.source_sha }}
          max-attempts: '18'
          sleep-seconds: '300'

      - name: Assert tag version matches package versions
        env:
          BASE_VERSION: ${{ steps.tag.outputs.base_version }}
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
        run: |
          set -euo pipefail

          version_files=(
            package.json
            package-lock.json
            app/package.json
            app/package-lock.json
            ui/package.json
            ui/package-lock.json
            e2e/package.json
            e2e/package-lock.json
          )

          for package_path in "${version_files[@]}"; do
            package_version="$(jq -r '.version // empty' "${package_path}")"
            if [ -z "${package_version}" ]; then
              echo "::error::Missing required version field in ${package_path}"
              exit 1
            fi
            if [ "${package_version}" != "${BASE_VERSION}" ]; then
              echo "::error::Version mismatch: tag base=${BASE_VERSION} (from ${RELEASE_TAG}), ${package_path}=${package_version}"
              exit 1
            fi
          done

          echo "Tag version ${BASE_VERSION} matches ${version_files[*]}."

      - name: Validate CHANGELOG entry for release tag
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
        run: |
          set -euo pipefail
          entry_file="$(mktemp)"

          if ! node scripts/extract-changelog-entry.mjs --version "${RELEASE_TAG}" --file CHANGELOG.md > "${entry_file}" 2>/dev/null; then
            echo "::error::CHANGELOG entry for ${RELEASE_TAG} missing. Add heading '## [${RELEASE_TAG#v}] - YYYY-MM-DD' and retry."
            exit 1
          fi

          if ! awk 'NR > 1 && NF { found = 1; exit } END { exit found ? 0 : 1 }' "${entry_file}"; then
            echo "::error::CHANGELOG entry for ${RELEASE_TAG} is empty."
            exit 1
          fi

          echo "Validated CHANGELOG entry for ${RELEASE_TAG}."

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        id: login_ghcr
        continue-on-error: true
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        id: login_dockerhub
        continue-on-error: true
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Quay.io
        id: login_quay
        continue-on-error: true
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Retry GHCR login
        if: steps.login_ghcr.outcome == 'failure'
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 2
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            set -euo pipefail
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Retry Docker Hub login
        if: steps.login_dockerhub.outcome == 'failure'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 2
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            set -euo pipefail
            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Retry Quay.io login
        if: steps.login_quay.outcome == 'failure'
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 2
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            set -euo pipefail
            echo "${QUAY_PASSWORD}" | docker login quay.io -u "${QUAY_USERNAME}" --password-stdin

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: |
            ghcr.io/${{ steps.target.outputs.repo_lower }}
            ${{ env.DOCKERHUB_REPO }}
            ${{ env.QUAY_REPO }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ steps.next.outputs.release_tag }}
            type=match,pattern=^v(\d+\.\d+)\.\d+-rc\.\d+$,group=1,suffix=-rc,value=${{ steps.next.outputs.release_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.next.outputs.release_tag }},enable=${{ steps.tag.outputs.is_prerelease == 'false' }}
            type=semver,pattern={{major}},value=${{ steps.next.outputs.release_tag }},enable=${{ steps.tag.outputs.is_prerelease == 'false' }}
            type=raw,value=latest,enable=${{ steps.tag.outputs.is_prerelease == 'false' }}

      - name: Docker staging metadata
        id: staging_meta
        if: steps.tag.outputs.is_prerelease == 'true'
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: |
            ghcr.io/${{ steps.target.outputs.repo_lower }}
            ${{ env.DOCKERHUB_REPO }}
            ${{ env.QUAY_REPO }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=release-staging-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Validate GA candidate digest in every registry
        if: steps.tag.outputs.is_prerelease == 'false'
        env:
          CANDIDATE_DIGEST: ${{ steps.source.outputs.image_digest }}
          CANDIDATE_TAG: ${{ inputs.candidate_tag }}
          GHCR_REPO: ${{ steps.target.outputs.repo_lower }}
        run: |
          set -euo pipefail
          candidate_refs=(
            "ghcr.io/${GHCR_REPO}:${CANDIDATE_TAG#v}"
            "${DOCKERHUB_REPO}:${CANDIDATE_TAG#v}"
            "${QUAY_REPO}:${CANDIDATE_TAG#v}"
          )

          for candidate_ref in "${candidate_refs[@]}"; do
            raw_manifest="$(mktemp)"
            docker buildx imagetools inspect --raw "${candidate_ref}" > "${raw_manifest}"
            computed_digest="sha256:$(sha256sum "${raw_manifest}" | cut -d ' ' -f 1)"
            rm -f "${raw_manifest}"
            if [ "${computed_digest}" != "${CANDIDATE_DIGEST}" ]; then
              echo "::error::${candidate_ref} resolves to ${computed_digest}, expected exact candidate ${CANDIDATE_DIGEST}."
              exit 1
            fi
          done

      - name: Build and push staging image
        id: build
        if: steps.tag.outputs.is_prerelease == 'true'
        continue-on-error: true  # allow manifest retry path on transient push failures
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: ${{ steps.staging_meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: DD_VERSION=${{ steps.next.outputs.next_version }}
          sbom: true
          provenance: mode=min
          cache-from: type=gha,scope=drydock
          cache-to: type=gha,mode=max,scope=drydock,ignore-error=true

      - name: Retry manifest publish on transient registry failure
        id: manifest-retry
        if: steps.tag.outputs.is_prerelease == 'true' && steps.build.outcome == 'failure'
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.staging_meta.outputs.tags }}
          GHCR_REPO: ${{ steps.target.outputs.repo_lower }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            set -euo pipefail

            if [ -z "${BUILD_DIGEST:-}" ]; then
              echo "::error::Build step failed before producing a digest; cannot retry manifest publish without a source digest."
              exit 1
            fi

            source_candidates=(
              "ghcr.io/${GHCR_REPO}@${BUILD_DIGEST}"
              "${DOCKERHUB_REPO}@${BUILD_DIGEST}"
              "${QUAY_REPO}@${BUILD_DIGEST}"
            )

            source_ref=""
            for candidate in "${source_candidates[@]}"; do
              if docker buildx imagetools inspect "${candidate}" >/dev/null 2>&1; then
                source_ref="${candidate}"
                break
              fi
            done

            if [ -z "${source_ref}" ]; then
              echo "::error::No registry contains source manifest digest ${BUILD_DIGEST}; cannot perform manifest-only retry."
              exit 1
            fi

            while IFS= read -r tag; do
              [ -z "${tag}" ] && continue
              echo "Re-pushing manifest tag: ${tag} (source: ${source_ref})"
              docker buildx imagetools create --tag "${tag}" "${source_ref}" >/dev/null
            done <<< "${TAGS}"

            echo "digest=${BUILD_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Resolve image digest
        id: digest
        env:
          CANDIDATE_DIGEST: ${{ steps.source.outputs.image_digest }}
          RETRY_DIGEST: ${{ steps.manifest-retry.outputs.digest }}
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          digest="${CANDIDATE_DIGEST:-${RETRY_DIGEST:-${BUILD_DIGEST:-}}}"
          if ! [[ "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Release source did not produce a valid image digest."
            exit 1
          fi
          echo "value=${digest}" >> "$GITHUB_OUTPUT"

      - name: Resolve image source references
        id: image_refs
        env:
          CANDIDATE_TAG: ${{ inputs.candidate_tag }}
          GHCR_REPO: ${{ steps.target.outputs.repo_lower }}
          IS_PRERELEASE: ${{ steps.tag.outputs.is_prerelease }}
          STAGING_TAGS: ${{ steps.staging_meta.outputs.tags }}
        run: |
          set -euo pipefail
          {
            echo 'tags<<DRYDOCK_IMAGE_REFS'
            if [ "${IS_PRERELEASE}" = "true" ]; then
              printf '%s\n' "${STAGING_TAGS}"
            else
              echo "ghcr.io/${GHCR_REPO}:${CANDIDATE_TAG#v}"
              echo "${DOCKERHUB_REPO}:${CANDIDATE_TAG#v}"
              echo "${QUAY_REPO}:${CANDIDATE_TAG#v}"
            fi
            echo 'DRYDOCK_IMAGE_REFS'
          } >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign container images
        if: steps.tag.outputs.is_prerelease == 'true'
        env:
          DIGEST: ${{ steps.digest.outputs.value }}
          TAGS: ${{ steps.image_refs.outputs.tags }}
        run: |
          set -euo pipefail
          images=()
          while IFS= read -r tag; do
            [ -n "${tag}" ] && images+=("${tag}@${DIGEST}")
          done <<< "${TAGS}"
          cosign sign --yes "${images[@]}"

      - name: Verify container image signatures
        env:
          DIGEST: ${{ steps.digest.outputs.value }}
          TAGS: ${{ steps.image_refs.outputs.tags }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            set -euo pipefail
            # OIDC identity pinned to release-cut.yml@refs/heads/main; the
            # branch guard at the top of this job enforces the ref. See
            # content/docs/current/guides/verifying-releases for the user-facing
            # identity regex.
            identity_regex="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release-cut.yml@refs/heads/main$"
            issuer="https://token.actions.githubusercontent.com"

            images=()
            while IFS= read -r tag; do
              [ -n "${tag}" ] && images+=("${tag}@${DIGEST}")
            done <<< "${TAGS}"

            if [ "${#images[@]}" -eq 0 ]; then
              echo "::error::No images found to verify"
              exit 1
            fi

            for image in "${images[@]}"; do
              echo "Verifying cosign signature for ${image}"
              cosign verify \
                --certificate-identity-regexp "${identity_regex}" \
                --certificate-oidc-issuer "${issuer}" \
                "${image}" >/dev/null
            done

      - name: Attest container build provenance
        id: attest_container_image
        if: steps.tag.outputs.is_prerelease == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: ghcr.io/${{ steps.target.outputs.repo_lower }}
          subject-digest: ${{ steps.digest.outputs.value }}
          push-to-registry: true

      - name: Verify container build provenance attestation
        env:
          DIGEST: ${{ steps.digest.outputs.value }}
          GHCR_REPO: ${{ steps.target.outputs.repo_lower }}
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          set -euo pipefail
          gh attestation verify "oci://ghcr.io/${GHCR_REPO}@${DIGEST}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-cut.yml" \
            --source-ref refs/heads/main \
            --source-digest "${SOURCE_SHA}" \
            --bundle-from-oci >/dev/null

      - name: Generate container SBOM
        env:
          DIGEST: ${{ steps.digest.outputs.value }}
          GHCR_REPO: ${{ steps.target.outputs.repo_lower }}
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          TRIVY_IMAGE: aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f  # 0.72.0
        run: |
          set -euo pipefail
          mkdir -p dist
          image_ref="ghcr.io/${GHCR_REPO}@${DIGEST}"
          sbom_path="dist/drydock-${RELEASE_TAG}.image.spdx.json"

          docker run --rm \
            --volume "${PWD}/dist:/out" \
            --volume "${HOME}/.docker:/root/.docker:ro" \
            "${TRIVY_IMAGE}" \
            image \
            --format spdx-json \
            --output "/out/$(basename "${sbom_path}")" \
            --timeout 15m \
            "${image_ref}"

          jq -e '.spdxVersion == "SPDX-2.3" and (.packages | type == "array")' "${sbom_path}" >/dev/null

      - name: Attest container SBOM
        id: attest_container_sbom
        if: steps.tag.outputs.is_prerelease == 'true'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
        with:
          subject-name: ghcr.io/${{ steps.target.outputs.repo_lower }}
          subject-digest: ${{ steps.digest.outputs.value }}
          subject-version: ${{ steps.next.outputs.next_version }}
          sbom-path: dist/drydock-${{ steps.next.outputs.release_tag }}.image.spdx.json
          push-to-registry: true

      - name: Verify container SBOM attestation
        env:
          DIGEST: ${{ steps.digest.outputs.value }}
          GHCR_REPO: ${{ steps.target.outputs.repo_lower }}
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          set -euo pipefail
          gh attestation verify "oci://ghcr.io/${GHCR_REPO}@${DIGEST}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-cut.yml" \
            --source-ref refs/heads/main \
            --source-digest "${SOURCE_SHA}" \
            --predicate-type https://spdx.dev/Document/v2.3 \
            --bundle-from-oci >/dev/null

      - name: Build release artifact
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          set -euo pipefail
          mkdir -p dist
          artifact="dist/drydock-${RELEASE_TAG}.tar.gz"
          git archive --format=tar.gz --prefix="drydock-${RELEASE_TAG}/" --output="${artifact}" "${SOURCE_SHA}"
          sha256sum "${artifact}" > "${artifact}.sha256"

      - name: Sign release artifact
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            set -euo pipefail
            artifact="dist/drydock-${RELEASE_TAG}.tar.gz"
            rm -f "${artifact}.bundle" "${artifact}.sig" "${artifact}.pem"
            cosign sign-blob --yes \
              --bundle "${artifact}.bundle" \
              "${artifact}"

            sig_b64="$(jq -er '.base64Signature // .messageSignature.signature' "${artifact}.bundle")"
            printf '%s' "${sig_b64}" | base64 --decode > "${artifact}.sig"

            cert_pem="$(jq -r '.cert // empty' "${artifact}.bundle")"
            if [ -n "${cert_pem}" ]; then
              printf '%s\n' "${cert_pem}" > "${artifact}.pem"
            else
              cert_der_b64="$(jq -er '.verificationMaterial.certificate.rawBytes' "${artifact}.bundle")"
              printf '%s' "${cert_der_b64}" | base64 --decode | openssl x509 -inform DER -out "${artifact}.pem"
            fi

            if [ ! -s "${artifact}.sig" ] || [ ! -s "${artifact}.pem" ]; then
              echo "::error::Expected signature outputs were not generated"
              ls -la dist
              jq 'keys' "${artifact}.bundle" || true
              exit 1
            fi

      - name: Verify release artifact signature
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
        run: |
          set -euo pipefail
          artifact="dist/drydock-${RELEASE_TAG}.tar.gz"
          identity_regex="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release-cut.yml@refs/heads/main$"
          issuer="https://token.actions.githubusercontent.com"

          cosign verify-blob \
            --bundle "${artifact}.bundle" \
            --certificate-identity-regexp "${identity_regex}" \
            --certificate-oidc-issuer "${issuer}" \
            "${artifact}" >/dev/null

      - name: Attest release artifact provenance
        id: attest_release_artifact
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: dist/drydock-${{ steps.next.outputs.release_tag }}.tar.gz

      - name: Export release provenance asset
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          BUNDLE_PATH: ${{ steps.attest_release_artifact.outputs.bundle-path }}
        run: |
          set -euo pipefail
          artifact="dist/drydock-${RELEASE_TAG}.tar.gz"
          cp "${BUNDLE_PATH}" "${artifact}.intoto.jsonl"

      - name: Verify release artifact provenance attestation
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail
          artifact="dist/drydock-${RELEASE_TAG}.tar.gz"
          gh attestation verify "${artifact}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-cut.yml" \
            --source-ref refs/heads/main \
            --source-digest "${TARGET_SHA}" \
            --bundle "${artifact}.intoto.jsonl" >/dev/null

      - name: Generate release notes from changelog
        id: release_notes
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes_path="dist/release-notes-${RELEASE_TAG}.md"

          entry_path="$(mktemp)"
          missing_heading="## [${RELEASE_TAG#v}] - YYYY-MM-DD"
          if ! node scripts/extract-changelog-entry.mjs --version "${RELEASE_TAG}" --file CHANGELOG.md > "${entry_path}"; then
            rm -f "${entry_path}" "${notes_path}"
            echo "::error::Release notes generation failed: CHANGELOG entry missing for ${RELEASE_TAG}. Add heading '${missing_heading}' and retry release."
            {
              echo "### Release Notes Generation"
              echo "- Result: FAIL"
              echo "- AI_ACTION_REQUIRED: Add CHANGELOG entry for \`${RELEASE_TAG}\` using heading \`${missing_heading}\`, then re-run release."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          # Resolve the previous release for a Full Changelog compare link. The
          # current tag is not pushed yet, so the newest existing release is the
          # predecessor; the select() guards re-runs after a partial release.
          prev_tag="$(gh release list --repo "${REPO}" --limit 100 \
            --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | map(.tagName)
                  | map(select(. != env.RELEASE_TAG)) | .[0] // empty' \
            2>/dev/null || true)"

          {
            echo "# ${RELEASE_TAG}"
            echo ""
            if [ -n "${prev_tag}" ]; then
              echo "**Full Changelog**: https://github.com/${REPO}/compare/${prev_tag}...${RELEASE_TAG}"
              echo ""
            fi
            cat "${entry_path}"
          } > "${notes_path}"
          rm -f "${entry_path}"

          # Standing upgrade notes: the per-version extract above only carries
          # notes written into that one CHANGELOG section, so a release that did
          # not repeat the 1.4.6/1.5 behavioral-change callout would ship without
          # it. Append the maintained block to every 1.4.6+ / 1.5.x release
          # (idempotent — skipped if the section already inlines the marker).
          node scripts/append-upgrade-notes.mjs \
            --notes "${notes_path}" \
            --version "${RELEASE_TAG}" \
            --file UPGRADE-NOTES.md

          echo "path=${notes_path}" >> "$GITHUB_OUTPUT"

      - name: Prepare draft GitHub Release and upload signed assets
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ steps.tag.outputs.is_prerelease }}
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          RELEASE_NOTES_PATH: ${{ steps.release_notes.outputs.path }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            set -euo pipefail
            prerelease_args=()
            if [ "${IS_PRERELEASE}" = "true" ]; then
              prerelease_args=(--prerelease)
            fi

            if gh release view "${RELEASE_TAG}" --json isDraft >/tmp/drydock-release.json 2>/dev/null; then
              if [ "$(jq -r '.isDraft' /tmp/drydock-release.json)" != "true" ]; then
                echo "::error::Release ${RELEASE_TAG} is already public; refusing to alter it."
                exit 1
              fi
            else
              gh release create "${RELEASE_TAG}" \
                --draft \
                --target "${SOURCE_SHA}" \
                --title "${RELEASE_TAG}" \
                --notes-file "${RELEASE_NOTES_PATH}" \
                "${prerelease_args[@]}"
            fi

            gh release edit "${RELEASE_TAG}" \
              --draft \
              --title "${RELEASE_TAG}" \
              --notes-file "${RELEASE_NOTES_PATH}" \
              "${prerelease_args[@]}"
            gh release upload "${RELEASE_TAG}" \
              "dist/drydock-${RELEASE_TAG}.tar.gz" \
              "dist/drydock-${RELEASE_TAG}.tar.gz.sha256" \
              "dist/drydock-${RELEASE_TAG}.tar.gz.bundle" \
              "dist/drydock-${RELEASE_TAG}.tar.gz.sig" \
              "dist/drydock-${RELEASE_TAG}.tar.gz.intoto.jsonl" \
              "dist/drydock-${RELEASE_TAG}.tar.gz.pem" \
              "dist/drydock-${RELEASE_TAG}.image.spdx.json" \
              --clobber

      # ────────────────────────────────────────────────────────────────────
      # PUBLIC FINALIZATION
      # All expensive and failure-prone preparation is complete. The remaining
      # operations are ordered and idempotent: publish exact-digest image tags,
      # push/verify the git tag, then publish the prepared draft release. If a
      # service fails between steps, re-dispatching resumes from verified state.
      # ────────────────────────────────────────────────────────────────────

      - name: Publish release image tags
        env:
          DIGEST: ${{ steps.digest.outputs.value }}
          SOURCE_REFS: ${{ steps.image_refs.outputs.tags }}
          TAGS: ${{ steps.meta.outputs.tags }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            set -euo pipefail
            while IFS= read -r tag; do
              [ -z "${tag}" ] && continue
              target_repository="${tag%:*}"
              source_ref=""
              while IFS= read -r candidate; do
                [ -z "${candidate}" ] && continue
                if [ "${candidate%:*}" = "${target_repository}" ] && \
                  docker buildx imagetools inspect "${candidate}@${DIGEST}" >/dev/null 2>&1; then
                  source_ref="${candidate%@*}@${DIGEST}"
                  break
                fi
              done <<< "${SOURCE_REFS}"
              if [ -z "${source_ref}" ]; then
                echo "::error::${target_repository} does not expose exact source digest ${DIGEST}."
                exit 1
              fi

              docker buildx imagetools create --tag "${tag}" "${source_ref}" >/dev/null
              raw_manifest="$(mktemp)"
              docker buildx imagetools inspect --raw "${tag}" > "${raw_manifest}"
              published_digest="sha256:$(sha256sum "${raw_manifest}" | cut -d ' ' -f 1)"
              rm -f "${raw_manifest}"
              if [ "${published_digest}" != "${DIGEST}" ]; then
                echo "::error::Published ${tag} resolved to ${published_digest}, expected ${DIGEST}."
                exit 1
              fi
            done <<< "${TAGS}"

      - name: Push release tag
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if remote_sha="$(git ls-remote --exit-code origin "refs/tags/${RELEASE_TAG}^{}" | awk '{print $1}')"; then
            if [ "${remote_sha}" != "${SOURCE_SHA}" ]; then
              echo "::error::Remote tag ${RELEASE_TAG} points to ${remote_sha}, expected ${SOURCE_SHA}."
              exit 1
            fi
            echo "Remote tag already points to the exact release source."
          else
            git tag -a -f "${RELEASE_TAG}" "${SOURCE_SHA}" -m "release: ${RELEASE_TAG}"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            set -euo pipefail
            gh release edit "${RELEASE_TAG}" --draft=false
            if [ "$(gh release view "${RELEASE_TAG}" --json isDraft --jq '.isDraft')" != "false" ]; then
              echo "::error::Release ${RELEASE_TAG} is still a draft after publish."
              exit 1
            fi

      - name: Release summary
        env:
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
          RELEASE_LEVEL: ${{ steps.next.outputs.release_level }}
          NEXT_VERSION: ${{ steps.next.outputs.next_version }}
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          DIGEST: ${{ steps.digest.outputs.value }}
        run: |
          {
            echo "### Release Summary"
            echo "- Release source SHA: \`${SOURCE_SHA}\`"
            echo "- Bump level: \`${RELEASE_LEVEL}\`"
            echo "- Version: \`${NEXT_VERSION}\`"
            echo "- Tag: \`${RELEASE_TAG}\`"
            echo "- Image digest: \`${DIGEST}\`"
          } >> "$GITHUB_STEP_SUMMARY"
