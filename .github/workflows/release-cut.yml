name: "🏷️ Release: Cut"
run-name: "🏷️ Release: Cut — manual by ${{ github.actor }}"

# Tag-last release pipeline. Everything that can fail (CI check, Docker build,
# multi-registry push, cosign signing, SLSA attestation, artifact sign) runs
# BEFORE the git tag is pushed. The tag is a receipt that the release
# succeeded end-to-end — if you see the tag, the image exists.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to cut, e.g. v1.5.0-rc.17 or v1.5.0. Tag base must match package.json version and the tag must not already exist."
        required: true
        type: string

permissions: {}

concurrency:
  group: release-cut
  cancel-in-progress: false

env:
  DOCKER_PLATFORMS: linux/amd64,linux/arm64
  CI_VERIFY_WORKFLOW_FILE: ci-verify.yml
  E2E_PLAYWRIGHT_WORKFLOW_FILE: e2e-playwright.yml

jobs:
  release:
    name: "🚀 Release: Build, Publish, Tag"
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Multi-arch build, signing, attestations, release upload, and CI-success polling budget
    environment: release-publish
    permissions:
      contents: write      # git push tag, gh release create
      packages: write      # ghcr push
      id-token: write      # cosign keyless signing
      attestations: write  # attest-build-provenance
      artifact-metadata: write  # GitHub-native OCI attestation storage records
      actions: read        # wait-for-successful-branch-ci queries workflow runs

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Assert dispatched from main
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [ "${GIT_REF}" != "refs/heads/main" ]; then
            echo "::error::release-cut must be dispatched from refs/heads/main, got ${GIT_REF}. The cosign OIDC identity is pinned to main."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Resolve target SHA and lowercase repository
        id: target
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          # Docker registries reject uppercase repository names. ${GITHUB_REPOSITORY}
          # preserves the org casing (e.g. "CodesWhat/drydock") so we expose a
          # pre-lowered value for every step that builds an image reference.
          repo_lower="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          {
            echo "sha=${sha}"
            echo "repo_lower=${repo_lower}"
          } >> "$GITHUB_OUTPUT"
          echo "Target SHA: ${sha}"
          echo "Repository (lowercase): ${repo_lower}"

      - name: Wait for successful branch CI on target SHA
        uses: ./.github/actions/wait-for-successful-branch-ci
        with:
          github-token: ${{ github.token }}
          workflow-file: ${{ env.CI_VERIFY_WORKFLOW_FILE }}
          target-sha: ${{ steps.target.outputs.sha }}
          # 60-min budget at 5-min cadence. CI Verify runs 20-30m typically;
          # pathological CodeQL/mutation overlap can push to ~60m. Polling
          # more often than every 5m is wasteful because CI jobs only change
          # state on completion, not mid-flight.
          max-attempts: '12'
          sleep-seconds: '300'

      - name: Wait for successful E2E Playwright on target SHA
        uses: ./.github/actions/wait-for-successful-branch-ci
        with:
          github-token: ${{ github.token }}
          workflow-file: ${{ env.E2E_PLAYWRIGHT_WORKFLOW_FILE }}
          target-sha: ${{ steps.target.outputs.sha }}
          # Playwright moved to its own workflow so its failures don't
          # poison ci-verify's Check Suite for Scorecard. Releases still
          # gate on it — runs ~10-15m typically, share the same 60-min
          # budget shape.
          max-attempts: '12'
          sleep-seconds: '300'

      - name: Resolve release tag from input
        id: next
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          if ! [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release_tag '${RELEASE_TAG}'. Expected vX.Y.Z or vX.Y.Z-prerelease (e.g. v1.5.0 or v1.5.0-rc.17)."
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "::error::Tag already exists: ${RELEASE_TAG}. Pick the next unused tag and re-dispatch."
            exit 1
          fi

          next_version="${RELEASE_TAG#v}"
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            release_level="prerelease"
          else
            release_level="release"
          fi

          {
            echo "release_level=${release_level}"
            echo "next_version=${next_version}"
            echo "release_tag=${RELEASE_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Parse release tag
        id: tag
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
        run: |
          set -euo pipefail

          output="$(node scripts/release-tag.mjs --tag "${RELEASE_TAG}")"
          while IFS= read -r kv; do
            key="${kv%%=*}"
            value="${kv#*=}"
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done <<< "${output}"

      - name: Assert tag version matches package versions
        env:
          BASE_VERSION: ${{ steps.tag.outputs.base_version }}
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
        run: |
          set -euo pipefail

          for package_path in package.json app/package.json ui/package.json; do
            package_version="$(jq -r '.version // empty' "${package_path}")"
            if [ -z "${package_version}" ]; then
              echo "::error::Missing required version field in ${package_path}"
              exit 1
            fi
            if [ "${package_version}" != "${BASE_VERSION}" ]; then
              echo "::error::Version mismatch: tag base=${BASE_VERSION} (from ${RELEASE_TAG}), ${package_path}=${package_version}"
              exit 1
            fi
          done

          echo "Tag version ${BASE_VERSION} matches package.json, app/package.json, and ui/package.json."

      - name: Validate CHANGELOG entry for release tag
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          IS_PRERELEASE: ${{ steps.tag.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          entry_file="$(mktemp)"

          if node scripts/extract-changelog-entry.mjs --version "${RELEASE_TAG}" --file CHANGELOG.md > "${entry_file}" 2>/dev/null; then
            echo "Found exact CHANGELOG entry for ${RELEASE_TAG}."
          elif [ "${IS_PRERELEASE}" = "true" ] && node scripts/extract-changelog-entry.mjs --version "Unreleased" --file CHANGELOG.md > "${entry_file}" 2>/dev/null; then
            echo "Using [Unreleased] CHANGELOG section for pre-release ${RELEASE_TAG}."
          else
            echo "::error::CHANGELOG entry for ${RELEASE_TAG} missing. Add heading '## [${RELEASE_TAG#v}] - YYYY-MM-DD' and retry."
            exit 1
          fi

          if ! awk 'NR > 1 && NF { found = 1; exit } END { exit found ? 0 : 1 }' "${entry_file}"; then
            echo "::error::CHANGELOG entry for ${RELEASE_TAG} is empty."
            exit 1
          fi

          echo "Validated CHANGELOG entry for ${RELEASE_TAG}."

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        id: login_ghcr
        continue-on-error: true
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        id: login_dockerhub
        continue-on-error: true
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Quay.io
        id: login_quay
        continue-on-error: true
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Retry registry logins on failure
        if: steps.login_ghcr.outcome == 'failure' || steps.login_dockerhub.outcome == 'failure' || steps.login_quay.outcome == 'failure'
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
          GHCR_OUTCOME: ${{ steps.login_ghcr.outcome }}
          DOCKERHUB_OUTCOME: ${{ steps.login_dockerhub.outcome }}
          QUAY_OUTCOME: ${{ steps.login_quay.outcome }}
        run: |
          set -euo pipefail
          if [ "${GHCR_OUTCOME}" = "failure" ]; then
            for i in 1 2 3; do
              if echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin; then
                break
              fi
              sleep $((5*i))
            done
          fi
          if [ "${DOCKERHUB_OUTCOME}" = "failure" ]; then
            for i in 1 2 3; do
              if echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin; then
                break
              fi
              sleep $((5*i))
            done
          fi
          if [ "${QUAY_OUTCOME}" = "failure" ]; then
            for i in 1 2 3; do
              if echo "${QUAY_PASSWORD}" | docker login quay.io -u "${QUAY_USERNAME}" --password-stdin; then
                break
              fi
              sleep $((5*i))
            done
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: |
            ghcr.io/${{ steps.target.outputs.repo_lower }}
            docker.io/codeswhat/drydock
            quay.io/codeswhat/drydock
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ steps.next.outputs.release_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.next.outputs.release_tag }},enable=${{ steps.tag.outputs.is_prerelease == 'false' }}
            type=semver,pattern={{major}},value=${{ steps.next.outputs.release_tag }},enable=${{ steps.tag.outputs.is_prerelease == 'false' }}
            type=raw,value=latest,enable=${{ steps.tag.outputs.is_prerelease == 'false' }}

      - name: Build and push
        id: build
        continue-on-error: true  # allow manifest retry path on transient push failures
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: DD_VERSION=${{ steps.next.outputs.next_version }}
          sbom: true
          provenance: mode=min
          cache-from: type=gha,scope=drydock
          cache-to: type=gha,mode=max,scope=drydock,ignore-error=true

      - name: Retry manifest publish on transient registry failure
        id: manifest-retry
        if: steps.build.outcome == 'failure'
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
          GHCR_REPO: ${{ steps.target.outputs.repo_lower }}
        run: |
          set -euo pipefail

          if [ -z "${BUILD_DIGEST:-}" ]; then
            echo "::error::Build step failed before producing a digest; cannot retry manifest publish without a source digest."
            exit 1
          fi

          source_candidates=(
            "ghcr.io/${GHCR_REPO}@${BUILD_DIGEST}"
            "docker.io/codeswhat/drydock@${BUILD_DIGEST}"
            "quay.io/codeswhat/drydock@${BUILD_DIGEST}"
          )

          source_ref=""
          for candidate in "${source_candidates[@]}"; do
            if docker buildx imagetools inspect "${candidate}" >/dev/null 2>&1; then
              source_ref="${candidate}"
              break
            fi
          done

          if [ -z "${source_ref}" ]; then
            echo "::error::No registry contains source manifest digest ${BUILD_DIGEST}; cannot perform manifest-only retry."
            exit 1
          fi

          while IFS= read -r tag; do
            [ -z "${tag}" ] && continue
            echo "Re-pushing manifest tag: ${tag} (source: ${source_ref})"
            for attempt in 1 2 3; do
              if docker buildx imagetools create --tag "${tag}" "${source_ref}" >/dev/null; then
                break
              fi

              if [ "${attempt}" -eq 3 ]; then
                echo "::error::Manifest publish retry failed for ${tag}"
                exit 1
              fi

              sleep 5
            done
          done <<< "${TAGS}"

          echo "digest=${BUILD_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Resolve image digest
        id: digest
        if: steps.build.outcome == 'success' || steps.manifest-retry.outcome == 'success'
        env:
          RETRY_DIGEST: ${{ steps.manifest-retry.outputs.digest }}
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "value=${RETRY_DIGEST:-$BUILD_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: steps.build.outcome == 'success' || steps.manifest-retry.outcome == 'success'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign container images
        if: steps.digest.outputs.value
        env:
          DIGEST: ${{ steps.digest.outputs.value }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          images=()
          while IFS= read -r tag; do
            [ -n "${tag}" ] && images+=("${tag}@${DIGEST}")
          done <<< "${TAGS}"
          cosign sign --yes "${images[@]}"

      - name: Verify container image signatures
        if: steps.digest.outputs.value
        env:
          DIGEST: ${{ steps.digest.outputs.value }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          # OIDC identity pinned to release-cut.yml@refs/heads/main; the
          # branch guard at the top of this job enforces the ref. See
          # content/docs/current/guides/verifying-releases for the user-facing
          # identity regex.
          identity_regex="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release-cut.yml@refs/heads/main$"
          issuer="https://token.actions.githubusercontent.com"

          images=()
          while IFS= read -r tag; do
            [ -n "${tag}" ] && images+=("${tag}@${DIGEST}")
          done <<< "${TAGS}"

          if [ "${#images[@]}" -eq 0 ]; then
            echo "::error::No images found to verify"
            exit 1
          fi

          for image in "${images[@]}"; do
            echo "Verifying cosign signature for ${image}"
            for attempt in 1 2 3; do
              if cosign verify \
                --certificate-identity-regexp "${identity_regex}" \
                --certificate-oidc-issuer "${issuer}" \
                "${image}" >/dev/null; then
                break
              fi

              if [ "${attempt}" -eq 3 ]; then
                echo "::error::Cosign verification failed for ${image}"
                exit 1
              fi

              sleep 5
            done
          done

      - name: Attest container build provenance
        id: attest_container_image
        if: steps.digest.outputs.value
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: ghcr.io/${{ steps.target.outputs.repo_lower }}
          subject-digest: ${{ steps.digest.outputs.value }}
          push-to-registry: true

      - name: Verify container build provenance attestation
        if: steps.digest.outputs.value
        env:
          DIGEST: ${{ steps.digest.outputs.value }}
          GHCR_REPO: ${{ steps.target.outputs.repo_lower }}
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail
          gh attestation verify "oci://ghcr.io/${GHCR_REPO}@${DIGEST}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-cut.yml" \
            --source-ref refs/heads/main \
            --source-digest "${TARGET_SHA}" \
            --bundle-from-oci >/dev/null

      - name: Generate container SBOM
        if: steps.digest.outputs.value
        env:
          DIGEST: ${{ steps.digest.outputs.value }}
          GHCR_REPO: ${{ steps.target.outputs.repo_lower }}
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          image_ref="ghcr.io/${GHCR_REPO}@${DIGEST}"
          sbom_path="dist/drydock-${RELEASE_TAG}.image.spdx.json"

          docker run --rm \
            --entrypoint trivy \
            --volume "${PWD}/dist:/out" \
            --volume "${HOME}/.docker:/root/.docker:ro" \
            "${image_ref}" \
            image \
            --format spdx-json \
            --output "/out/$(basename "${sbom_path}")" \
            --timeout 15m \
            "${image_ref}"

          jq -e '.spdxVersion == "SPDX-2.3" and (.packages | type == "array")' "${sbom_path}" >/dev/null

      - name: Attest container SBOM
        id: attest_container_sbom
        if: steps.digest.outputs.value
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
        with:
          subject-name: ghcr.io/${{ steps.target.outputs.repo_lower }}
          subject-digest: ${{ steps.digest.outputs.value }}
          subject-version: ${{ steps.next.outputs.next_version }}
          sbom-path: dist/drydock-${{ steps.next.outputs.release_tag }}.image.spdx.json
          push-to-registry: true

      - name: Verify container SBOM attestation
        if: steps.digest.outputs.value
        env:
          DIGEST: ${{ steps.digest.outputs.value }}
          GHCR_REPO: ${{ steps.target.outputs.repo_lower }}
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail
          gh attestation verify "oci://ghcr.io/${GHCR_REPO}@${DIGEST}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-cut.yml" \
            --source-ref refs/heads/main \
            --source-digest "${TARGET_SHA}" \
            --predicate-type https://spdx.dev/Document/v2.3 \
            --bundle-from-oci >/dev/null

      - name: Build release artifact
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail
          mkdir -p dist
          artifact="dist/drydock-${RELEASE_TAG}.tar.gz"
          git archive --format=tar.gz --prefix="drydock-${RELEASE_TAG}/" --output="${artifact}" "${TARGET_SHA}"
          sha256sum "${artifact}" > "${artifact}.sha256"

      - name: Sign release artifact
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
        run: |
          set -euo pipefail
          artifact="dist/drydock-${RELEASE_TAG}.tar.gz"
          for attempt in 1 2 3; do
            if cosign sign-blob --yes \
              --bundle "${artifact}.bundle" \
              "${artifact}"; then
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "::error::cosign sign-blob failed after 3 attempts"
              exit 1
            fi
            sleep $((5*attempt))
          done

          sig_b64="$(jq -er '.base64Signature // .messageSignature.signature' "${artifact}.bundle")"
          printf '%s' "${sig_b64}" | base64 --decode > "${artifact}.sig"

          cert_pem="$(jq -r '.cert // empty' "${artifact}.bundle")"
          if [ -n "${cert_pem}" ]; then
            printf '%s\n' "${cert_pem}" > "${artifact}.pem"
          else
            cert_der_b64="$(jq -er '.verificationMaterial.certificate.rawBytes' "${artifact}.bundle")"
            printf '%s' "${cert_der_b64}" | base64 --decode | openssl x509 -inform DER -out "${artifact}.pem"
          fi

          if [ ! -s "${artifact}.sig" ] || [ ! -s "${artifact}.pem" ]; then
            echo "::error::Expected signature outputs were not generated"
            ls -la dist
            jq 'keys' "${artifact}.bundle" || true
            exit 1
          fi

      - name: Verify release artifact signature
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
        run: |
          set -euo pipefail
          artifact="dist/drydock-${RELEASE_TAG}.tar.gz"
          identity_regex="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release-cut.yml@refs/heads/main$"
          issuer="https://token.actions.githubusercontent.com"

          cosign verify-blob \
            --bundle "${artifact}.bundle" \
            --certificate-identity-regexp "${identity_regex}" \
            --certificate-oidc-issuer "${issuer}" \
            "${artifact}" >/dev/null

      - name: Attest release artifact provenance
        id: attest_release_artifact
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: dist/drydock-${{ steps.next.outputs.release_tag }}.tar.gz

      - name: Export release provenance asset
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          BUNDLE_PATH: ${{ steps.attest_release_artifact.outputs.bundle-path }}
        run: |
          set -euo pipefail
          artifact="dist/drydock-${RELEASE_TAG}.tar.gz"
          cp "${BUNDLE_PATH}" "${artifact}.intoto.jsonl"

      - name: Verify release artifact provenance attestation
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail
          artifact="dist/drydock-${RELEASE_TAG}.tar.gz"
          gh attestation verify "${artifact}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-cut.yml" \
            --source-ref refs/heads/main \
            --source-digest "${TARGET_SHA}" \
            --bundle "${artifact}.intoto.jsonl" >/dev/null

      - name: Generate release notes from changelog
        id: release_notes
        env:
          IS_PRERELEASE: ${{ steps.tag.outputs.is_prerelease }}
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes_path="dist/release-notes-${RELEASE_TAG}.md"

          entry_path="$(mktemp)"
          missing_heading="## [${RELEASE_TAG#v}] - YYYY-MM-DD"
          used_unreleased_fallback=false
          if ! node scripts/extract-changelog-entry.mjs --version "${RELEASE_TAG}" --file CHANGELOG.md > "${entry_path}"; then
            if [ "${IS_PRERELEASE}" = "true" ] && node scripts/extract-changelog-entry.mjs --version "Unreleased" --file CHANGELOG.md > "${entry_path}" 2>/dev/null; then
              echo "Using [Unreleased] changelog section for pre-release ${RELEASE_TAG}."
              used_unreleased_fallback=true
            else
              rm -f "${entry_path}" "${notes_path}"
              echo "::error::Release notes generation failed: CHANGELOG entry missing for ${RELEASE_TAG}. Add heading '${missing_heading}' and retry release."
              {
                echo "### Release Notes Generation"
                echo "- Result: FAIL"
                echo "- AI_ACTION_REQUIRED: Add CHANGELOG entry for \`${RELEASE_TAG}\` using heading \`${missing_heading}\`, then re-run release."
              } >> "${GITHUB_STEP_SUMMARY}"
              exit 1
            fi
          fi

          # The [Unreleased] fallback means the CHANGELOG was not stamped before
          # the cut. Rewrite the section heading in the generated notes so the
          # published release shows the version and date instead of a literal
          # "[Unreleased]" — a cut can never ship an unstamped heading. The
          # CHANGELOG.md file itself is stamped separately at release time.
          if [ "${used_unreleased_fallback}" = "true" ]; then
            stamped_heading="## [${RELEASE_TAG#v}] — $(date -u +%Y-%m-%d)"
            stamped_path="$(mktemp)"
            awk -v h="${stamped_heading}" \
              'NR == 1 && /^## \[Unreleased\][[:space:]]*$/ { print h; next } { print }' \
              "${entry_path}" > "${stamped_path}"
            mv "${stamped_path}" "${entry_path}"
          fi

          # Resolve the previous release for a Full Changelog compare link. The
          # current tag is not pushed yet, so the newest existing release is the
          # predecessor; the select() guards re-runs after a partial release.
          prev_tag="$(gh release list --repo "${REPO}" --limit 100 \
            --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | map(.tagName)
                  | map(select(. != env.RELEASE_TAG)) | .[0] // empty' \
            2>/dev/null || true)"

          {
            echo "# ${RELEASE_TAG}"
            echo ""
            if [ -n "${prev_tag}" ]; then
              echo "**Full Changelog**: https://github.com/${REPO}/compare/${prev_tag}...${RELEASE_TAG}"
              echo ""
            fi
            cat "${entry_path}"
          } > "${notes_path}"
          rm -f "${entry_path}"
          echo "path=${notes_path}" >> "$GITHUB_OUTPUT"

      # ────────────────────────────────────────────────────────────────────
      # POINT OF NO RETURN
      # Everything above this line can fail without leaking a tag or release
      # to users. The tag push below is the public commitment that this
      # release exists; it runs ONLY after image push, signing, attestation,
      # and artifact generation have all succeeded.
      # ────────────────────────────────────────────────────────────────────

      - name: Push release tag
        env:
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${RELEASE_TAG}" "${TARGET_SHA}" -m "release: ${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub Release and upload signed assets
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ steps.tag.outputs.is_prerelease }}
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          RELEASE_NOTES_PATH: ${{ steps.release_notes.outputs.path }}
        run: |
          set -euo pipefail
          prerelease_flag=""
          if [ "${IS_PRERELEASE}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          for attempt in 1 2 3; do
            if gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes-file "${RELEASE_NOTES_PATH}" ${prerelease_flag}; then :; else
              if [ "${attempt}" -eq 3 ]; then exit 1; fi
              sleep $((5*attempt))
              continue
            fi
            if gh release edit "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes-file "${RELEASE_NOTES_PATH}" ${prerelease_flag}; then :; else
              if [ "${attempt}" -eq 3 ]; then exit 1; fi
              sleep $((5*attempt))
              continue
            fi
            if gh release upload "${RELEASE_TAG}" \
              "dist/drydock-${RELEASE_TAG}.tar.gz" \
              "dist/drydock-${RELEASE_TAG}.tar.gz.sha256" \
              "dist/drydock-${RELEASE_TAG}.tar.gz.bundle" \
              "dist/drydock-${RELEASE_TAG}.tar.gz.sig" \
              "dist/drydock-${RELEASE_TAG}.tar.gz.intoto.jsonl" \
              "dist/drydock-${RELEASE_TAG}.tar.gz.pem" \
              "dist/drydock-${RELEASE_TAG}.image.spdx.json" \
              --clobber; then
              break
            fi
            if [ "${attempt}" -eq 3 ]; then exit 1; fi
            sleep $((5*attempt))
          done

      - name: Release summary
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
          RELEASE_LEVEL: ${{ steps.next.outputs.release_level }}
          NEXT_VERSION: ${{ steps.next.outputs.next_version }}
          RELEASE_TAG: ${{ steps.next.outputs.release_tag }}
          DIGEST: ${{ steps.digest.outputs.value }}
        run: |
          {
            echo "### Release Summary"
            echo "- Target SHA: \`${TARGET_SHA}\`"
            echo "- Bump level: \`${RELEASE_LEVEL}\`"
            echo "- Version: \`${NEXT_VERSION}\`"
            echo "- Tag: \`${RELEASE_TAG}\`"
            echo "- Image digest: \`${DIGEST}\`"
          } >> "$GITHUB_STEP_SUMMARY"
