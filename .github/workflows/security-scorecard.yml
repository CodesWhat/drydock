name: "🛡️ Security: OpenSSF Scorecard"
run-name: >-
  ${{
    github.event_name == 'branch_protection_rule' && '🛡️ Security: OpenSSF Scorecard — Branch protection changed' ||
    github.event_name == 'schedule' && '🛡️ Security: OpenSSF Scorecard — Weekly schedule' ||
    github.event_name == 'workflow_dispatch' && format('🛡️ Security: OpenSSF Scorecard — Manual by {0}', github.actor) ||
    format('🛡️ Security: OpenSSF Scorecard — {0}', github.ref_name)
  }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

permissions: read-all

concurrency:
  group: scorecard-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  analysis:
    name: "🛡️ Security: Scorecard Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read  # Allow SARIF upload metadata reads on private repos
      checks: read  # Improve CI/SAST detection on private repos
      contents: read  # Checkout code
      issues: read  # Improve maintainer/activity checks on private repos
      pull-requests: read  # Improve commit/review checks on private repos
      security-events: write  # Upload SARIF results
      id-token: write  # Publish results to OpenSSF REST API

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        timeout-minutes: 15
        with:
          results_file: results.sarif
          results_format: sarif
          repo_token: ${{ secrets.SCORECARD_TOKEN || github.token }}
          publish_results: true

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          sarif_file: results.sarif
