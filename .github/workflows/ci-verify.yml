name: "🔬 CI Verify"
run-name: >-
  ${{
    github.event_name == 'pull_request' && format('🔬 CI Verify — PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title) ||
    github.event_name == 'push' && format('🔬 CI Verify — {0}', github.event.head_commit.message) ||
    github.event_name == 'merge_group' && format('🔬 CI Verify — Merge Queue: {0}', github.ref_name) ||
    github.event_name == 'workflow_call' && format('🔬 CI Verify — workflow_call ({0})', github.sha) ||
    format('🔬 CI Verify — {0}', github.ref_name)
  }}

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches: [main]
  schedule:
    # Both schedules now run the full security sweep: CodeQL, Fuzz, DAST
    # (ZAP baseline + Nuclei), plus the lint/test/build chain DAST depends on.
    # Twice-weekly cadence catches drift in external CodeQL queries, Nuclei
    # templates, and ZAP signatures between merges to main.
    - cron: '30 6 * * 1'  # Monday 06:30 UTC
    - cron: '0 6 * * 0'   # Sunday 06:00 UTC
  merge_group:
    branches: [main]
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false

concurrency:
  # Key on the source branch name (`head_ref` on PRs, `ref_name` on
  # main/release pushes and merge_group) so rapid successive pushes to
  # the same branch cancel the in-flight run.
  group: ci-verify-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  zizmor:
    name: "🔐 Security: Actions"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d  # v0.5.6
        with:
          version: v1.25.2
          advanced-security: true
          token: ${{ github.token }}

  changes:
    name: "🔎 Changes: Path Filter"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      runtime: ${{ steps.filter.outputs.runtime }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          # On push events, diff against the ref's previous SHA so we get
          # per-push changes. dorny/paths-filter's default on non-default
          # branches is to diff against the repository's default branch,
          # which on a long-lived release branch means every commit sees
          # the entire branch diff and runtime is always true. Pull
          # request events leave base unset so the action falls back to
          # the PR target diff (the correct behavior there).
          base: ${{ github.event_name == 'push' && github.event.before || '' }}
          # runtime=true when the changeset touches anything that can affect
          # runtime behavior. Keep this shared with e2e-playwright.yml so both
          # heavy E2E gates short-circuit symmetrically on pure docs/changelog
          # edits.
          filters: .github/filters/runtime.yml

  codeql:
    name: "🛡️ SAST: CodeQL"
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [zizmor]
    runs-on: ubuntu-latest
    timeout-minutes: 60  # CodeQL init/autobuild/analyze can be long on cache misses
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          category: /language:${{ matrix.language }}

  fuzz:
    name: "🎯 Fuzz Testing"
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [zizmor]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      issues: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Run fuzz tests
        id: fuzz-run
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p ../artifacts/fuzz
          npx vitest run --reporter=verbose '.fuzz.test.ts' 2>&1 | tee ../artifacts/fuzz/fuzz-test.log
        working-directory: app

      - name: Summarize fuzz result
        id: fuzz-status
        if: always()
        env:
          FUZZ_OUTCOME: ${{ steps.fuzz-run.outcome }}
        run: |
          set -euo pipefail

          if [ "${FUZZ_OUTCOME}" = "success" ]; then
            echo "failed=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Fuzz Testing"
              echo "- Result: PASS"
              echo "- Log artifact: \`fuzz-log-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "failed=true" >> "$GITHUB_OUTPUT"
          {
            echo "### Fuzz Testing"
            echo "- Result: FAIL"
            echo "- AI_ACTION_REQUIRED: inspect fuzz log artifact and failing seed/case before merge."
            echo "- Log artifact: \`fuzz-log-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload fuzz log artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fuzz-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/fuzz/fuzz-test.log
          if-no-files-found: warn
          retention-days: 14

      - name: Notify via issue on unattended failure
        if: steps.fuzz-status.outputs.failed == 'true' && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: "🚨 CI: Fuzz tests failing on main"
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          api_headers=(
            -H "Authorization: Bearer ${GH_TOKEN}"
            -H "Accept: application/vnd.github+json"
          )

          issues_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues?state=open&per_page=100"
          open_issues="$(curl -fsSL "${api_headers[@]}" "${issues_url}")"
          existing_number="$(echo "${open_issues}" | jq -r --arg title "${ISSUE_TITLE}" '.[] | select(.title == $title and (.pull_request | not)) | .number' | head -n1)"

          comment_body=$(
            cat <<EOF
          Fuzz job failed again.

          - Workflow run: ${RUN_URL}
          - Commit: \`${GITHUB_SHA}\`
          - Ref: \`${GITHUB_REF}\`
          - Log artifact: \`fuzz-log-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}\`
          EOF
          )

          if [ -n "${existing_number}" ]; then
            comment_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/${existing_number}/comments"
            curl -fsSL -X POST "${api_headers[@]}" "${comment_url}" \
              -d "$(jq -n --arg body "${comment_body}" '{body: $body}')" >/dev/null
            exit 0
          fi

          issue_body=$(
            cat <<EOF
          Fuzz tests are failing on unattended runs.

          - Latest failing run: ${RUN_URL}
          - Commit: \`${GITHUB_SHA}\`
          - Ref: \`${GITHUB_REF}\`
          - Log artifact: \`fuzz-log-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}\`

          Keep this issue open until fuzz is green again.
          EOF
          )

          create_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues"
          curl -fsSL -X POST "${api_headers[@]}" "${create_url}" \
            -d "$(jq -n --arg title "${ISSUE_TITLE}" --arg body "${issue_body}" '{title: $title, body: $body}')" >/dev/null

      - name: Fail workflow on fuzz failure
        if: steps.fuzz-status.outputs.failed == 'true'
        run: exit 1

  dependency-review:
    name: "📦 Security: Dependency Review"
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          base-ref: ${{ github.event_name == 'push' && github.event.before || '' }}
          head-ref: ${{ github.event_name == 'push' && github.sha || '' }}

  commit-message:
    name: "📝 Policy: Commit Message Gate (Advisory)"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate commit messages in PR range
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/validate-commit-range.mjs --base "${BASE_SHA}" --head "${HEAD_SHA}"

  lint:
    name: "🧹 Quality: Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Block new @ts-nocheck usage
        run: node scripts/check-ts-nocheck-allowlist.mjs

      - name: Biome check
        run: npx biome check .

      - name: Setup Qlty
        uses: qltysh/qlty-action/install@a19242102d17e497f437d7466aa01b528537e899  # v2.2.0

      - name: Qlty check (all plugins, enforced)
        run: ./scripts/qlty-check-gate.sh all

      - name: Qlty smells report (advisory)
        run: |
          mkdir -p artifacts/qlty
          node scripts/qlty-smells-gate.mjs \
            --scope=all \
            --sarif-output=artifacts/qlty/qlty-smells-all.sarif \
            --summary-output=artifacts/qlty/qlty-smells-summary.md

      - name: Upload Qlty smells report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: qlty-smells-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/qlty
          if-no-files-found: warn
          retention-days: 14

  test:
    name: "🧪 Quality: Test & Coverage"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ci-codecov
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install repository dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci --ignore-scripts

      - name: Run scripts tests
        run: node --test scripts/*.test.mjs

      - name: Install app dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: cd app && npm ci

      - name: Run workflow tests
        run: npm run test:workflows

      - name: Install ui dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: cd ui && npm ci

      - name: Run app tests
        run: npm test
        working-directory: app

      - name: Typecheck ui
        run: npm run typecheck
        working-directory: ui

      - name: Run ui tests
        run: npm run test:unit
        working-directory: ui

      - name: Normalize coverage paths for Codecov
        run: node scripts/prepare-codecov-reports.mjs

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/codecov-app.lcov.info,coverage/codecov-ui.lcov.info
          flags: app,ui
          fail_ci_if_error: false  # coverage upload is informational — don't block CI on transient Codecov infra failures

  build:
    name: "🏗️ Build"
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 35  # Includes UI build + single-arch QA image + multi-arch smoke build
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install ui dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: cd ui && npm ci

      - name: Build ui
        run: npm run build
        working-directory: ui

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Docker build (QA image + smoke test)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: drydock:dev
          build-args: DD_VERSION=ci
          # load: true uses the docker exporter, which can't accept the OCI
          # manifest list produced by provenance attestations. The release-cut
          # workflow keeps provenance because it actually pushes to registries.
          provenance: false
          cache-from: type=gha,scope=drydock
          cache-to: type=gha,mode=max,scope=drydock,ignore-error=true

      - name: Set up QEMU (multi-arch smoke build)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      - name: Docker build (multi-arch smoke)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          build-args: DD_VERSION=ci-multiarch-smoke
          # Smoke build never lands in a registry, so attesting it adds noise
          # without value. Real attestations live on release-cut.yml.
          provenance: false
          cache-from: type=gha,scope=drydock
          cache-to: type=gha,mode=max,scope=drydock,ignore-error=true

      - name: Export QA image artifact
        run: |
          mkdir -p artifacts/qa
          docker save drydock:dev | gzip > artifacts/qa/drydock-dev-image.tar.gz

      - name: Upload QA image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: qa-image-${{ github.run_id }}
          path: artifacts/qa/drydock-dev-image.tar.gz
          if-no-files-found: error
          retention-days: 1

  dast-zap-baseline:
    name: "🕷️ DAST: ZAP Baseline"
    runs-on: ubuntu-latest
    timeout-minutes: 25  # Includes QA stack startup and scanner container runtime
    # Run on every merge to main (gates the next release-cut), on legacy
    # release branches (back-compat), and on the existing weekly schedules
    # so external-template/signature drift is caught between merges.
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')))
      || github.event_name == 'schedule'
    needs: [build]
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Download QA image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: qa-image-${{ github.run_id }}
          path: artifacts/qa

      - name: Load QA image
        run: docker load < artifacts/qa/drydock-dev-image.tar.gz

      - name: Start QA stack
        run: docker compose -p drydock-zap -f test/qa-compose.yml up -d

      - name: Wait for QA health
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            if curl -sf http://localhost:3333/health >/dev/null 2>&1; then
              echo "Drydock is healthy"
              exit 0
            fi
            sleep 2
          done

          echo "Drydock failed to become healthy after 120 seconds."
          docker compose -p drydock-zap -f test/qa-compose.yml ps
          exit 1

      - name: Create ZAP authenticated session
        id: zap_auth
        run: |
          set -euo pipefail

          cookie_jar="$(mktemp)"
          trap 'rm -f "${cookie_jar}"' EXIT

          basic_auth="$(printf 'admin:password' | base64 | tr -d '\n')"
          echo "::add-mask::${basic_auth}"
          curl -fsS \
            -c "${cookie_jar}" \
            -H "Authorization: Basic ${basic_auth}" \
            -H 'Content-Type: application/json' \
            --data '{"remember":false}' \
            http://localhost:3333/auth/login >/dev/null

          curl -fsS -b "${cookie_jar}" http://localhost:3333/auth/user >/dev/null

          cookie_header="$(
            awk '
              /^#HttpOnly_/ { sub(/^#HttpOnly_/, "") }
              /^#/ || NF < 7 { next }
              { printf "%s%s=%s", sep, $6, $7; sep="; " }
            ' "${cookie_jar}"
          )"

          if [ -z "${cookie_header}" ]; then
            echo "::error::Authenticated ZAP login did not produce a session cookie."
            exit 1
          fi

          echo "::add-mask::${cookie_header}"
          printf 'cookie_header=%s\n' "${cookie_header}" >> "${GITHUB_OUTPUT}"

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25  # v0.15.0
        env:
          ZAP_AUTH_HEADER: Cookie
          ZAP_AUTH_HEADER_VALUE: ${{ steps.zap_auth.outputs.cookie_header }}
          ZAP_AUTH_HEADER_SITE: localhost:3333
        with:
          target: http://localhost:3333
          docker_name: ghcr.io/zaproxy/zaproxy@sha256:2ec1d5d5b44d55cfd02ba9b89cd26852f06d92b7fc0ce9f064b9463babc73074  # stable digest, 2026-05-28
          allow_issue_writing: false
          fail_action: true
          cmd_options: '-I'

      - name: Convert ZAP JSON report to SARIF
        if: always() && hashFiles('report_json.json') != ''
        run: |
          node scripts/zap-json-to-sarif.mjs \
            --input=report_json.json \
            --output=artifacts/zap/zap-baseline.sarif

      - name: Upload ZAP SARIF
        if: always() && hashFiles('artifacts/zap/zap-baseline.sarif') != ''
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: artifacts/zap/zap-baseline.sarif
          category: zap-baseline

      - name: Upload ZAP HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: zap-baseline-html-${{ github.run_id }}-${{ github.run_attempt }}
          path: report_html.html
          if-no-files-found: warn
          retention-days: 30

      - name: Summarize ZAP findings
        if: always()
        run: |
          set -uo pipefail

          report="report_json.json"
          artifact_name="zap-baseline-html-${{ github.run_id }}-${{ github.run_attempt }}"
          artifact_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}#artifacts"
          auth_mode="Basic session cookie"

          high=0
          medium=0
          low=0
          info=0
          total=0
          parse_error=0

          if [ -f "${report}" ] && [ -s "${report}" ]; then
            if jq -e . "${report}" >/dev/null 2>&1; then
              high="$(jq '[.site[]?.alerts[]? | select((.riskcode // "") == "3")] | length' "${report}")"
              medium="$(jq '[.site[]?.alerts[]? | select((.riskcode // "") == "2")] | length' "${report}")"
              low="$(jq '[.site[]?.alerts[]? | select((.riskcode // "") == "1")] | length' "${report}")"
              info="$(jq '[.site[]?.alerts[]? | select((.riskcode // "") == "0")] | length' "${report}")"
              total=$((high + medium + low + info))
            else
              parse_error=1
            fi
          fi

          {
            echo "### DAST: ZAP Baseline"
            if [ ! -f "${report}" ]; then
              echo "- Report: JSON output not found (\`${report}\`)."
            elif [ ! -s "${report}" ]; then
              echo "- Report: JSON output is empty (\`${report}\`)."
            elif [ "${parse_error}" -eq 1 ]; then
              echo "- Report: JSON output could not be parsed (\`${report}\`)."
            fi
            echo "- Findings: **${total}**"
            echo "- Severity breakdown: high=${high}, medium=${medium}, low=${low}, info=${info}"
            echo "- Auth: ${auth_mode}"
            echo "- Artifact: [${artifact_name}](${artifact_url})"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Show QA logs on failure
        if: failure()
        run: docker compose -p drydock-zap -f test/qa-compose.yml logs --no-color

      - name: Stop QA stack
        if: always()
        run: docker compose -p drydock-zap -f test/qa-compose.yml down -v --remove-orphans

  dast-nuclei:
    name: "🔎 DAST: Nuclei"
    runs-on: ubuntu-latest
    timeout-minutes: 25  # Includes QA stack startup and full medium+ template pass
    # Same gate as dast-zap-baseline — push to main, legacy release branches,
    # and the weekly schedules.
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')))
      || github.event_name == 'schedule'
    needs: [build]
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Download QA image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: qa-image-${{ github.run_id }}
          path: artifacts/qa

      - name: Load QA image
        run: docker load < artifacts/qa/drydock-dev-image.tar.gz

      - name: Start QA stack
        run: docker compose -p drydock-nuclei -f test/qa-compose.yml up -d

      - name: Wait for QA health
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            if curl -sf http://localhost:3333/health >/dev/null 2>&1; then
              echo "Drydock is healthy"
              exit 0
            fi
            sleep 2
          done

          echo "Drydock failed to become healthy after 120 seconds."
          docker compose -p drydock-nuclei -f test/qa-compose.yml ps
          exit 1

      - name: Create Nuclei authenticated session
        id: nuclei_auth
        run: |
          set -euo pipefail

          cookie_jar="$(mktemp)"
          trap 'rm -f "${cookie_jar}"' EXIT

          basic_auth="$(printf 'admin:password' | base64 | tr -d '\n')"
          echo "::add-mask::${basic_auth}"
          curl -fsS \
            -c "${cookie_jar}" \
            -H "Authorization: Basic ${basic_auth}" \
            -H 'Content-Type: application/json' \
            --data '{"remember":false}' \
            http://localhost:3333/auth/login >/dev/null

          curl -fsS -b "${cookie_jar}" http://localhost:3333/auth/user >/dev/null

          cookie_header="$(
            awk '
              /^#HttpOnly_/ { sub(/^#HttpOnly_/, "") }
              /^#/ || NF < 7 { next }
              { printf "%s%s=%s", sep, $6, $7; sep="; " }
            ' "${cookie_jar}"
          )"

          if [ -z "${cookie_header}" ]; then
            echo "::error::Authenticated Nuclei login did not produce a session cookie."
            exit 1
          fi

          echo "::add-mask::${cookie_header}"
          printf 'cookie_header=%s\n' "${cookie_header}" >> "${GITHUB_OUTPUT}"

      - name: Create Nuclei report directory
        run: mkdir -p artifacts/dast

      - name: Run Nuclei scan
        id: nuclei_scan
        continue-on-error: true
        uses: projectdiscovery/nuclei-action@32a91c0da7be14c07b0ade6c14fa0f6e78d97c9c  # v3.1.0
        with:
          version: v3.8.0
          args: >-
            -u http://localhost:3333
            -severity medium,high,critical
            -type http
            -H "Cookie: ${{ steps.nuclei_auth.outputs.cookie_header }}"
            -json-export artifacts/dast/nuclei-report.json
            -sarif-export artifacts/dast/nuclei-report.sarif
            -silent

      - name: Enforce Nuclei severity gate (medium+)
        env:
          SCAN_OUTCOME: ${{ steps.nuclei_scan.outcome }}
        run: |
          set -euo pipefail

          report="artifacts/dast/nuclei-report.json"

          if [ ! -f "${report}" ]; then
            echo "Nuclei did not produce a JSON report."
            if [ "${SCAN_OUTCOME}" != "success" ]; then
              echo "Nuclei action failed before report generation."
              exit 1
            fi
            exit 0
          fi

          if [ ! -s "${report}" ]; then
            echo "No medium+ findings detected."
            if [ "${SCAN_OUTCOME}" != "success" ]; then
              echo "Nuclei action did not succeed."
              exit 1
            fi
            exit 0
          fi

          finding_count="$(jq -s '[.[] | (if type == "array" then .[] else . end) | select(((.info.severity // .severity // "") | ascii_downcase | test("^(medium|high|critical)$")))] | length' "${report}")"
          echo "Medium+ findings: ${finding_count}"

          if [ "${SCAN_OUTCOME}" != "success" ]; then
            echo "Nuclei action did not complete successfully."
            exit 1
          fi

          if [ "${finding_count}" -gt 0 ]; then
            echo "Nuclei reported medium+ severity findings."
            exit 1
          fi

      - name: Prepare Nuclei SARIF report
        id: nuclei_sarif
        if: always()
        env:
          SCAN_OUTCOME: ${{ steps.nuclei_scan.outcome }}
        run: |
          set -euo pipefail

          sarif="artifacts/dast/nuclei-report.sarif"

          if [ -s "${sarif}" ]; then
            if jq -e '.version == "2.1.0" and (.runs | type == "array")' "${sarif}" >/dev/null; then
              echo "upload=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            echo "::warning::Nuclei SARIF output is not valid SARIF 2.1.0; skipping Code Scanning upload."
            echo "upload=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${SCAN_OUTCOME}" != "success" ]; then
            echo "Nuclei did not produce SARIF because the scan failed."
            echo "upload=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          cat > "${sarif}" <<'JSON'
          {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "Nuclei",
                    "informationUri": "https://github.com/projectdiscovery/nuclei",
                    "semanticVersion": "3.8.0",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          JSON

          echo "upload=true" >> "${GITHUB_OUTPUT}"

      - name: Upload Nuclei SARIF to code scanning
        if: always() && steps.nuclei_sarif.outputs.upload == 'true'
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: artifacts/dast/nuclei-report.sarif
          category: nuclei

      - name: Upload Nuclei reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: nuclei-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/dast/nuclei-report.json
            artifacts/dast/nuclei-report.sarif
          if-no-files-found: warn
          retention-days: 30

      - name: Summarize Nuclei findings
        if: always()
        run: |
          set -uo pipefail

          report="artifacts/dast/nuclei-report.json"
          sarif="artifacts/dast/nuclei-report.sarif"
          artifact_name="nuclei-reports-${{ github.run_id }}-${{ github.run_attempt }}"
          artifact_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}#artifacts"

          critical=0
          high=0
          medium=0
          low=0
          info=0
          total=0
          parse_error=0

          if [ -f "${report}" ] && [ -s "${report}" ]; then
            if jq -e -s . "${report}" >/dev/null 2>&1; then
              total="$(jq -s '[.[] | (if type == "array" then .[] else . end)] | length' "${report}")"
              critical="$(jq -s '[.[] | (if type == "array" then .[] else . end) | select(((.info.severity // .severity // "") | ascii_downcase) == "critical")] | length' "${report}")"
              high="$(jq -s '[.[] | (if type == "array" then .[] else . end) | select(((.info.severity // .severity // "") | ascii_downcase) == "high")] | length' "${report}")"
              medium="$(jq -s '[.[] | (if type == "array" then .[] else . end) | select(((.info.severity // .severity // "") | ascii_downcase) == "medium")] | length' "${report}")"
              low="$(jq -s '[.[] | (if type == "array" then .[] else . end) | select(((.info.severity // .severity // "") | ascii_downcase) == "low")] | length' "${report}")"
              info="$(jq -s '[.[] | (if type == "array" then .[] else . end) | select(((.info.severity // .severity // "") | ascii_downcase) == "info")] | length' "${report}")"
            else
              parse_error=1
            fi
          fi

          {
            echo "### DAST: Nuclei"
            if [ ! -f "${report}" ]; then
              echo "- Report: JSON output not found (\`${report}\`)."
            elif [ ! -s "${report}" ]; then
              echo "- Report: JSON output is empty (\`${report}\`)."
            elif [ "${parse_error}" -eq 1 ]; then
              echo "- Report: JSON output could not be parsed (\`${report}\`)."
            fi
            echo "- Findings: **${total}**"
            echo "- Severity breakdown: critical=${critical}, high=${high}, medium=${medium}, low=${low}, info=${info}"
            echo "- Auth: Basic session cookie"
            echo "- Templates: HTTP templates at medium+ severity"
            if [ -s "${sarif}" ]; then
              echo "- SARIF: \`${sarif}\`"
            else
              echo "- SARIF: not produced"
            fi
            echo "- Artifact: [${artifact_name}](${artifact_url})"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Show QA logs on failure
        if: failure()
        run: docker compose -p drydock-nuclei -f test/qa-compose.yml logs --no-color

      - name: Stop QA stack
        if: always()
        run: docker compose -p drydock-nuclei -f test/qa-compose.yml down -v --remove-orphans

  e2e:
    name: "🥒 E2E: Cucumber"
    if: github.event_name != 'schedule' && needs.changes.outputs.runtime == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, changes]
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      # Cache Playwright's browser binary directory across runs.
      # `npm ci` in e2e/ triggers a 167 MiB @playwright/browser-chromium
      # postinstall fetch from cdn.playwright.dev; the CDN has repeatedly
      # throttled the download to ~30 min, which used to time the job out.
      # Per-ref key mirrors the cache scoping in quality-mutation-monthly.yml
      # so an untrusted PR can't poison main's chromium binary.
      - name: Cache Playwright browsers
        # zizmor: ignore[cache-poisoning]
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ github.ref_name }}-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ github.ref_name }}-
            ${{ runner.os }}-playwright-

      - name: Install e2e dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: cd e2e && npm ci

      - name: Setup test containers
        run: ./scripts/setup-test-containers.sh

      - name: Start drydock
        id: drydock
        run: ./scripts/start-drydock.sh

      - name: Run Cucumber e2e tests
        run: npm run cucumber
        working-directory: e2e
        env:
          DD_PORT: ${{ steps.drydock.outputs.dd_port }}

      - name: Show drydock logs on failure
        if: failure()
        run: docker logs drydock

      - name: Cleanup
        if: always()
        run: ./scripts/cleanup-test-containers.sh

  # Playwright lives in its own workflow file (.github/workflows/e2e-playwright.yml)
  # so a single failing UI assertion doesn't drag this workflow's Check
  # Suite to "failure" — which had been making OpenSSF Scorecard's
  # CI-Tests check mark merged PRs as untested (alert #43). Releases
  # still gate on it via release-cut.yml's second wait step.

  load-test-ci:
    name: "⚡ Load Test: CI"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    needs: [build]
    # Load tests hit the API with Artillery; no browser needed. Skip the
    # @playwright/test postinstall chromium download (167 MiB from
    # cdn.playwright.dev, frequently throttled) for every `npm ci` in e2e/.
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      - name: Run Artillery load test
        id: run-load-test-ci
        env:
          ARTILLERY_ENV: ci
          DD_LOAD_TEST_BUILD_CACHE: gha
          DD_LOAD_TEST_ARTIFACT_DIR: artifacts/load-test/ci
        run: ./scripts/run-load-test.sh

      - name: Summarize load test metrics (ci)
        if: always()
        run: |
          report="$(find artifacts/load-test/ci -maxdepth 1 -name '*.json' -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -n1 | cut -d' ' -f2-)"
          ./scripts/summarize-load-test-report.sh "$report" "Load Test (CI)" "test/load-test-baselines/ci.json"

      - name: Correctness check (ci, enforced)
        if: always()
        env:
          DD_LOAD_TEST_CORRECTNESS_ENFORCE: 'true'
          DD_LOAD_TEST_MAX_5XX: '0'
          DD_LOAD_TEST_MAX_VUSERS_FAILED: '0'
          DD_LOAD_TEST_MIN_429: '0'
          DD_LOAD_TEST_MAX_429: '0'
        run: |
          report="$(find artifacts/load-test/ci -maxdepth 1 -name '*.json' -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -n1 | cut -d' ' -f2-)"
          ./scripts/check-load-test-correctness.sh "$report" "Load Test Correctness (CI)"

      - name: Resolve committed load test baseline (ci)
        id: load-test-baseline-ci
        if: ${{ always() && steps.run-load-test-ci.conclusion == 'success' }}
        run: |
          set -euo pipefail

          baseline_report="test/load-test-baselines/ci.json"
          if [ ! -f "${baseline_report}" ]; then
            echo "::error::Committed baseline not found at ${baseline_report}."
            exit 1
          fi

          echo "baseline_artifact_name=repo:${baseline_report}" >> "${GITHUB_OUTPUT}"
          echo "baseline_report=${baseline_report}" >> "${GITHUB_OUTPUT}"

      - name: Regression check against committed baseline (ci, enforced)
        if: ${{ always() && steps.run-load-test-ci.conclusion == 'success' }}
        env:
          BASELINE_REPORT: ${{ steps.load-test-baseline-ci.outputs.baseline_report }}
          DD_LOAD_TEST_BASELINE_ARTIFACT_NAME: ${{ steps.load-test-baseline-ci.outputs.baseline_artifact_name }}
          DD_LOAD_TEST_MAX_P95_INCREASE_PCT: '20'
          DD_LOAD_TEST_MAX_P99_INCREASE_PCT: '25'
          DD_LOAD_TEST_MAX_RATE_DECREASE_PCT: '40'
          DD_LOAD_TEST_MAX_P95_MS: '1200'
          DD_LOAD_TEST_MAX_P99_MS: '2500'
          DD_LOAD_TEST_MIN_REQUEST_RATE: '3'
          DD_LOAD_TEST_REGRESSION_ENFORCE: 'true'
        run: |
          set -euo pipefail

          if [ "${DD_LOAD_TEST_REGRESSION_ENFORCE:-}" != "true" ]; then
            echo "::error::Regression gate misconfigured: DD_LOAD_TEST_REGRESSION_ENFORCE must be true in enforced mode."
            exit 1
          fi

          current_report="$(find artifacts/load-test/ci -maxdepth 1 -name '*.json' -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -n1 | cut -d' ' -f2-)"
          if [ -z "${current_report}" ]; then
            echo "::error::Current CI report not found; cannot run regression gate."
            exit 1
          fi

          if [ -z "${BASELINE_REPORT}" ]; then
            echo "::error::Baseline report path is empty; expected committed baseline."
            exit 1
          fi

          ./scripts/check-load-test-regression.sh "${current_report}" "${BASELINE_REPORT}"

      - name: Upload load test artifact (ci)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: load-test-ci-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/load-test/ci/*.json
          if-no-files-found: warn
          retention-days: 30

  load-test-behavior:
    name: "⚡ Load Test: Behavior"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    needs: [build]
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      - name: Run Artillery behavior test
        id: run-load-test-behavior
        env:
          ARTILLERY_FILE: ./test/test-behavior.yml
          ARTILLERY_ENV: behavior
          DD_LOAD_TEST_BUILD_CACHE: gha
          DD_LOAD_TEST_ARTIFACT_DIR: artifacts/load-test/behavior
        run: ./scripts/run-load-test.sh

      - name: Summarize load test metrics (behavior)
        if: always()
        run: |
          report="$(find artifacts/load-test/behavior -maxdepth 1 -name '*.json' -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -n1 | cut -d' ' -f2-)"
          ./scripts/summarize-load-test-report.sh "$report" "Load Test (Behavior)" "test/load-test-baselines/behavior.json"

      - name: Correctness check (behavior, advisory)
        if: always()
        env:
          DD_LOAD_TEST_CORRECTNESS_ENFORCE: 'false'
          DD_LOAD_TEST_MAX_5XX: '0'
          DD_LOAD_TEST_MAX_VUSERS_FAILED: '0'
          DD_LOAD_TEST_MIN_429: '0'
          DD_LOAD_TEST_MAX_429: '0'
        run: |
          report="$(find artifacts/load-test/behavior -maxdepth 1 -name '*.json' -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -n1 | cut -d' ' -f2-)"
          ./scripts/check-load-test-correctness.sh "$report" "Load Test Correctness (Behavior)"

      - name: Resolve committed load test baseline (behavior)
        id: load-test-baseline-behavior
        if: ${{ always() && steps.run-load-test-behavior.conclusion == 'success' }}
        run: |
          set -euo pipefail

          baseline_report="test/load-test-baselines/behavior.json"
          if [ ! -f "${baseline_report}" ]; then
            echo "::error::Committed baseline not found at ${baseline_report}."
            exit 1
          fi

          echo "baseline_artifact_name=repo:${baseline_report}" >> "${GITHUB_OUTPUT}"
          echo "baseline_report=${baseline_report}" >> "${GITHUB_OUTPUT}"

      - name: Regression check against committed baseline (behavior, advisory)
        if: ${{ always() && steps.run-load-test-behavior.conclusion == 'success' }}
        env:
          BASELINE_REPORT: ${{ steps.load-test-baseline-behavior.outputs.baseline_report }}
          DD_LOAD_TEST_BASELINE_ARTIFACT_NAME: ${{ steps.load-test-baseline-behavior.outputs.baseline_artifact_name }}
          DD_LOAD_TEST_MAX_P95_INCREASE_PCT: '30'
          DD_LOAD_TEST_MAX_P99_INCREASE_PCT: '40'
          DD_LOAD_TEST_MAX_RATE_DECREASE_PCT: '50'
          DD_LOAD_TEST_MAX_P95_MS: '1500'
          DD_LOAD_TEST_MAX_P99_MS: '3000'
          DD_LOAD_TEST_MIN_REQUEST_RATE: '1'
          DD_LOAD_TEST_REGRESSION_ENFORCE: 'false'
        run: |
          set -euo pipefail

          current_report="$(find artifacts/load-test/behavior -maxdepth 1 -name '*.json' -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -n1 | cut -d' ' -f2-)"
          ./scripts/check-load-test-regression.sh "${current_report}" "${BASELINE_REPORT}"

      - name: Upload load test artifact (behavior)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: load-test-behavior-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/load-test/behavior/*.json
          if-no-files-found: warn
          retention-days: 30

  load-test-stress:
    name: "⚡ Load Test: Stress (Advisory)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    needs: [build]
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      - name: Run Artillery stress test (advisory)
        id: run-load-test-stress
        continue-on-error: true
        env:
          ARTILLERY_ENV: stress
          DD_LOAD_TEST_BUILD_CACHE: gha
          DD_LOAD_TEST_ARTIFACT_DIR: artifacts/load-test/stress
        run: ./scripts/run-load-test.sh

      - name: Summarize load test metrics (stress)
        if: always()
        run: |
          report="$(find artifacts/load-test/stress -maxdepth 1 -name '*.json' -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -n1 | cut -d' ' -f2-)"
          ./scripts/summarize-load-test-report.sh "$report" "Load Test (Stress)"

      - name: Correctness check (stress, advisory)
        if: always()
        env:
          DD_LOAD_TEST_CORRECTNESS_ENFORCE: 'false'
          DD_LOAD_TEST_MAX_5XX: '0'
          DD_LOAD_TEST_MAX_VUSERS_FAILED: '0'
          DD_LOAD_TEST_MIN_429: '0'
          DD_LOAD_TEST_MAX_429: '0'
        run: |
          report="$(find artifacts/load-test/stress -maxdepth 1 -name '*.json' -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -n1 | cut -d' ' -f2-)"
          ./scripts/check-load-test-correctness.sh "$report" "Load Test Correctness (Stress)"

      - name: Upload load test artifact (stress)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: load-test-stress-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/load-test/stress/*.json
          if-no-files-found: warn
          retention-days: 30
