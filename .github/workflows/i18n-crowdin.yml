name: "🌐 i18n: Crowdin Sync"

on:
  push:
    branches: [main]
    paths:
      - 'ui/src/locales/en/**'
      - 'crowdin.yml'
      - '.github/workflows/i18n-crowdin.yml'
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC — pull translations weekly
  workflow_dispatch:

concurrency:
  group: crowdin-sync
  cancel-in-progress: false

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: crowdin
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: crowdin/github-action@52aa776766211d83d975df51f3b9c53c2f8ba35f  # v2.16.3
        with:
          user: auto
          upload_sources: true
          upload_translations: true
          download_translations: true
          localization_branch_name: l10n_crowdin
          create_pull_request: true
          pull_request_title: "🔧 chore(i18n): sync translations from Crowdin"
          pull_request_body: "Automated sync from Crowdin. Review wording, then merge."
          pull_request_labels: "translations,crowdin"
          pull_request_base_branch_name: main
          commit_message: "🔧 chore(i18n): sync translations from Crowdin"
        env:
          # The crowdin/github-action entrypoint runs `git config --global`
          # (safe.directory, then the commit user) but the container inherits
          # HOME=/ from the runner, so those writes hit "could not lock config
          # file //.gitconfig: Permission denied" and the commit/PR step fails.
          # A step-level HOME can't fix it: GitHub passes HOME to container
          # actions via `-e HOME` pass-through, which always wins. Instead point
          # git's global config at a mounted, writable file — GIT_CONFIG_GLOBAL
          # is honored independent of HOME (git >= 2.32).
          GIT_CONFIG_GLOBAL: /github/home/.gitconfig
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
