name: Crowdin Sync

on:
  push:
    branches: [main]
    paths:
      - 'ui/src/locales/en/**'
      - 'crowdin.yml'
      - '.github/workflows/i18n-crowdin.yml'
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC — pull translations weekly
  workflow_dispatch:

concurrency:
  group: crowdin-sync
  cancel-in-progress: false

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: crowdin
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: crowdin/github-action@8868a33591d21088edfc398968173a3b98d51706  # v2.16.2
        continue-on-error: true
        with:
          upload_sources: true
          upload_translations: true
          download_translations: true
          download_translations_args: >-
            --language=de
            --language=es-ES
            --language=fr
            --language=it
            --language=ja
            --language=ko
            --language=nl
            --language=pl
            --language=pt-BR
            --language=tr
            --language=zh-CN
            --language=zh-TW
          localization_branch_name: l10n_crowdin
          create_pull_request: true
          pull_request_title: "🔧 chore(i18n): sync translations from Crowdin"
          pull_request_body: "Automated sync from Crowdin. Review wording, then merge."
          pull_request_labels: "translations,crowdin"
          pull_request_base_branch_name: main
          commit_message: "🔧 chore(i18n): sync translations from Crowdin"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
